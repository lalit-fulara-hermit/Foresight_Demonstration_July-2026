 el("#howOverlay").innerHTML=`<div class="hw-card"><button class="hw-close" data-action="closeHow">\u2715</button>
  <div class="hw-head"><div class="hw-eyebrow">How Foresight works</div><h2>From a faint signal to a Board decision</h2><div class="hw-rule">AI assists \u00b7 people decide</div></div>
  ${foundationsBand(false)}<span class="run-eyebrow">Runs continuously \u00b7 the loop</span><div class="hw-pipe"><div class="hw-line"></div><div class="hw-flow">${dots}</div><div class="hw-stages">${stages}</div></div>
  <div class="hw-foot">Nothing is scored or forecast. Every signal is labelled <b>weak</b>, <b>building</b> or <b>established</b>.</div>
  <div class="hw-guide">
   <div class="hw-note"><b>What is live today, and what is designed.</b> This is a working prototype. It runs on 48 hand-picked example signals, each labelled by the method below, so you can see how it behaves. The automatic scanning, the live source feeds and the software agents are fully specified but not yet switched on. Turning them on is the funded build. Where this guide says the tool reads sources or agents do something, read it as how it is built to work.</div>
   <div class="hw-sec"><h4>What this is</h4><p>The IEC writes the world's electrotechnical standards. Its committees need to spot new technology and market shifts early, so they can start standards work in time. Foresight collects those early signs of change, sorts them, and shows the Board what is coming and who should act.</p></div>
   <div class="hw-sec"><h4>The building block: a signal</h4><p>Everything here is built from signals. A signal is one piece of change worth watching, for example a new battery type getting close to production. Each signal carries a few facts: its area, how far along it is, how big it is, how many sources back it, and which IEC committee owns it.</p></div>
   <div class="hw-sec"><h4>The four lenses</h4><p>The tool watches from four angles, called lenses. Technology is the tech itself. Market is money, demand and who is building what. Regulatory is rules and standards. Geopolitical is trade, supply and national policy. Every signal sits under one lens.</p></div>
   <div class="hw-sec"><h4>The three labels</h4><p>Instead of a score, each signal gets one of three plain labels: weak (new and faint), building (gaining ground), or established (solid, sources agree). A named person sets the label. A score out of a hundred looks precise and gets over-trusted, and the evidence is rarely that exact, so the tool stays with three honest labels.</p></div>
   <div class="hw-sec"><h4>Who does the work</h4><p>The software does the first pass: it reads sources non-stop, groups what it finds, tags it, and drafts. A person then checks it, adds the point, and sets the label. The Board decides. Nothing is published without a named person signing it. In short, the software assists and people decide.</p></div>
   <div class="hw-sec"><h4>Opening a signal</h4><p>Click any dot or list item to open its card: a plain summary, what is driving it, its sources, the committees it touches, and buttons to send it to a committee, assign it, watch it, or add it to a report. This is what turns a list into something that routes work to people.</p></div>
   <div class="hw-sec hw-screens"><h4>How a signal gets its label</h4>
    <div class="hw-note2">A person sets the label, not a formula. They answer five plain questions and record the call. Any later change is logged with who changed it and why. The full method sits under How it runs, Classification method.</div>
    <div class="hw-row"><b>Weak</b><span>New and moving, but still thin on independent backing and low on maturity. Action: watch, do not brief yet.</span></div>
    <div class="hw-row"><b>Building</b><span>Gaining backing and maturity, not settled yet. Action: track and prepare.</span></div>
    <div class="hw-row"><b>Established</b><span>Well backed, mature, and sources agree. Action: ready to inform a standards decision.</span></div>
    <div class="hw-row"><b>Q1 Is it new?</b><span>Genuinely new versus what is already tracked. Newer leans weak.</span></div>
    <div class="hw-row"><b>Q2 Is it moving?</b><span>Is evidence building across sources. Fast movement leans weak.</span></div>
    <div class="hw-row"><b>Q3 Who else says so?</b><span>How many independent sources report it, and do they agree. More agreement leans established.</span></div>
    <div class="hw-row"><b>Q4 How proven?</b><span>Maturity on the 1 to 9 readiness scale. Higher leans established.</span></div>
    <div class="hw-row"><b>Q5 How far does it reach?</b><span>How many committees and areas it touches. Sets priority, not the label.</span></div>
    <div class="hw-row"><b>Example, Established</b><span>Wide-bandgap power devices: 31 sources, readiness 8. Well backed and mature.</span></div>
    <div class="hw-row"><b>Example, Building</b><span>Solid-state batteries: 19 sources, readiness 5. Gaining ground, not settled.</span></div>
    <div class="hw-row"><b>Example, Weak</b><span>Perovskite solar cells: 12 sources, readiness 4. New and moving but still thin.</span></div>
   </div>
   <div class="hw-sec hw-screens"><h4>Where the information comes from</h4>
    <div class="hw-note2">Not the open web. A fixed, trusted list of sources sorted into three levels, so coverage can be checked. Backing means independent sources: five outlets reprinting one press release count as one, not five.</div>
    <div class="hw-row"><b>Level A, primary</b><span>Trusted directly. Standards bodies (IEC, ISO, ITU, IEEE), regulators and official journals, patent and research records (WIPO, EPO, USPTO), agencies (IEA, IRENA), company filings.</span></div>
    <div class="hw-row"><b>Level B, corroborating</b><span>Used to confirm, not to start a signal. Industry groups, research labs (Fraunhofer, NREL), preprints (arXiv), major newswires (Reuters, Bloomberg, AP).</span></div>
    <div class="hw-row"><b>Level C, early</b><span>Earliest sightings, never trusted alone. Trade press, vendor announcements, expert blogs. Must be confirmed by a Level A or B source before it counts.</span></div>
   </div>
   <div class="hw-sec hw-screens"><h4>How signals are found (designed)</h4>
    <div class="hw-note2">In the built version, eight agents do the routine work within fixed limits, with every action logged. An agent is a program that does a set task on its own, not one that uses judgement. Five run on their own, two draft and alert but always pass a person, and one supervises the rest.</div>
    <div class="hw-row"><b>Monitoring</b><span>Watches the approved sources for anything new or changed. Read-only, never alters a source.</span></div>
    <div class="hw-row"><b>Extraction &amp; tagging</b><span>Pulls out facts, figures and the owning committee, and links each item to the right committees.</span></div>
    <div class="hw-row"><b>Triage</b><span>Groups duplicates, tags by lens and sub-topic, attaches sources, flags how new and how fast-moving.</span></div>
    <div class="hw-row"><b>Cross-check</b><span>Compares sources against each other and flags anything single-source or contradictory.</span></div>
    <div class="hw-row"><b>Routing</b><span>Sends each signal to the right analyst or committee queue.</span></div>
    <div class="hw-row"><b>Drafting</b><span>Writes summaries and briefs from fetched evidence only, and always hands the draft to a person.</span></div>
    <div class="hw-row"><b>Alerting</b><span>Raises alerts and the weekly digest; high-impact ones pass a person first.</span></div>
    <div class="hw-row"><b>Orchestrator</b><span>Sequences the agents, retries failures, enforces the rules and logs every step.</span></div>
    <div class="hw-row"><b>The no-invention rule</b><span>The software may only use facts it has fetched from a real document, and every claim must point to a source. No source, not publishable.</span></div>
   </div>
   <div class="hw-sec hw-screens"><h4>The screens, one by one</h4>
    <div class="hw-row"><b>Overview</b><span>The front page. Key counts, the most important and the newest faint signals, and how much has been found in each of the twelve areas, with gaps shown honestly.</span></div>
    <div class="hw-row"><b>Horizon radar</b><span>A dartboard view. All four lenses show as four slices, and rings from the centre out show maturity. A switch changes the rings to show when a signal will matter instead. Pick one lens and the whole circle becomes that lens, split into its own sub-topics. Colour is speed, size is importance.</span></div>
    <div class="hw-row"><b>Signal landscape</b><span>A round map where signals clump by area, with lines joining those that share a committee, so you see where activity is piling up. Positions are indicative, not exact, and the screen says so.</span></div>
    <div class="hw-row"><b>Signal feed</b><span>The plain list. Filter, sort and search. This is where the actual reading happens rather than the scanning.</span></div>
    <div class="hw-row"><b>Maturity / TRL</b><span>How far each technology has come on a standard one to nine readiness scale, from lab idea to proven in use, so you can see what is climbing and what has stalled.</span></div>
    <div class="hw-row"><b>Map views</b><span>Sectors, Standards, Market, Geopolitical and Knowledge graph are different cuts of the same signals: by area, by the rules pipeline, by a single lens, or drawn as a web of links.</span></div>
    <div class="hw-row"><b>How it runs</b><span>Explains the machine itself: who does what, the six steps a signal goes through, the labelling checklist, and the controls that keep the software in check.</span></div>
    <div class="hw-row"><b>Team tools</b><span>Workspace, Reports and Alerts. Assign a signal to a colleague, gather signals into a report and sign it off, and set what alerts you.</span></div>
    <div class="hw-row"><b>Requirements audit</b><span>A checklist showing the tool answers each point the IEC asked for, line by line.</span></div>
   </div>
   <div class="hw-sec"><h4>How it is built</h4><p>The whole tool is a single web page with nothing to install and no internet needed to run it. That keeps it reliable in front of the Board. It is a working demo, not the finished system.</p></div>
   <div class="hw-sec"><h4>What is real today</h4><p>It holds a small, curated set of example signals, kept deliberately small. The full version needs live data sources connected, which is the next main piece of work.</p></div>
  </div></div>`;
 el("#howOverlay").classList.add("show");

 openSignal(id);toast("Comment posted");
 setTimeout(()=>{const mate=TEAM.find(m=>m.online&&m.id!=="you");const replies=["Good catch — I'll pull the primary filings.","Agreed. Worth flagging to the committee.","I'll validate the sources on this today.","Adding this to the next brief."];

function runSearch(q){const drop=el("#searchDrop");if(!q){drop.classList.remove("show");return}
 const ql=q.toLowerCase();
 const sigs=SIGNALS.filter(s=>s.t.toLowerCase().includes(ql)||s.sum.toLowerCase().includes(ql)).slice(0,5);
 const secs=SECTORS.filter(s=>s.name.toLowerCase().includes(ql)||s.blurb.toLowerCase().includes(ql)).slice(0,3);
 const regs=REGS.filter(r=>r.n.toLowerCase().includes(ql)).slice(0,3);
 const comms=Object.entries(COMM).filter(([k,v])=>v.toLowerCase().includes(ql)).slice(0,4);
 let html="";
 if(sigs.length)html+=`<div class="sk">Signals</div>`+sigs.map(s=>`<div class="sres" data-action="searchsig" data-id="${s.id}">${s.t}</div>`).join("");
 if(secs.length)html+=`<div class="sk">Sectors</div>`+secs.map(s=>`<div class="sres" data-action="searchsector" data-key="${s.key}">${s.name}</div>`).join("");
 if(regs.length)html+=`<div class="sk">Standards & rules</div>`+regs.map(r=>`<div class="sres" data-action="searchsig" data-id="${r.sig}">${r.n}</div>`).join("");
 if(comms.length)html+=`<div class="sk">IEC committees</div>`+comms.map(([k,v])=>`<div class="sres" data-action="committee" data-c="${k}">${v}</div>`).join("");
 if(!html)html=`<div class="empty" style="padding:14px">No matches for “${q}”. Press Enter to search the feed.</div>`;
 drop.innerHTML=html;drop.classList.add("show")}

document.addEventListener("change",e=>{const a=e.target.closest("[data-action]");if(!a)return;if(a.dataset.action==="feedsort"){state.feedSort=e.target.value;el("#main").innerHTML=V.feed()}else if(a.dataset.action==="feedsector"){state.feedSector=e.target.value;el("#main").innerHTML=V.feed()}});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeDrawer();closeHowWorks();closeDoc();el("#searchDrop").classList.remove("show")}if(e.key==="/"&&document.activeElement!==el("#q")){e.preventDefault();el("#q").focus()}});

function graphHighlight(id){const svg=el("#graphsvg");if(!svg)return;
 const edges=[...svg.querySelectorAll(".gedge")],nodes=[...svg.querySelectorAll(".gn")];
 if(!id){edges.forEach(x=>x.classList.remove("faded","hl"));nodes.forEach(x=>x.classList.remove("faded"));return}
 const adj=new Set([id]);edges.forEach(ed=>{if(ed.dataset.a===id)adj.add(ed.dataset.b);if(ed.dataset.b===id)adj.add(ed.dataset.a)});
 edges.forEach(ed=>{const on=ed.dataset.a===id||ed.dataset.b===id;ed.classList.toggle("hl",on);ed.classList.toggle("faded",!on)});
 nodes.forEach(n=>{n.classList.toggle("faded",!adj.has(n.dataset.id))})}

/* masthead stays fixed and stable (scroll-collapse removed) */
let mastLast=0;
/* ---- hover-glossary: wrap first appearance of each term with a definition ---- */
function glossaryDecorate(root){
 const terms=Object.keys(TERMS).sort((a,b)=>b.length-a.length);
 const firstDone=new Set([...root.querySelectorAll('.gl.first')].map(n=>n.dataset.term));
 const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){
  if(!n.nodeValue.trim())return NodeFilter.FILTER_REJECT;
  let p=n.parentNode;while(p&&p!==root){const t=p.nodeName.toLowerCase();
   if(t==='script'||t==='style'||t==='svg'||t==='text')return NodeFilter.FILTER_REJECT;
   if(p.classList&&(p.classList.contains('gl')||p.classList.contains('glossary')))return NodeFilter.FILTER_REJECT;
   p=p.parentNode}return NodeFilter.FILTER_ACCEPT}});
 const nodes=[];let nn;while(nn=walker.nextNode())nodes.push(nn);
 for(const term of terms){const esc=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const re=new RegExp('(^|[^\\w-])('+esc+')(?![\\w-])');
  for(let k=0;k<nodes.length;k++){const node=nodes[k];if(!node.parentNode)continue;
   const m=node.nodeValue.match(re);if(!m)continue;
   const idx=m.index+m[1].length;const before=node.nodeValue.slice(0,idx);const after=node.nodeValue.slice(idx+term.length);
   const isFirst=!firstDone.has(term);firstDone.add(term);
   const span=document.createElement('span');span.className='gl'+(isFirst?' first':'');span.setAttribute('tabindex','0');span.dataset.term=term;span.textContent=term;
   const frag=document.createDocumentFragment();frag.appendChild(document.createTextNode(before));frag.appendChild(span);const an=document.createTextNode(after);frag.appendChild(an);
   node.parentNode.replaceChild(frag,node);nodes.splice(k,1,an)}}
}
/* single floating tooltip — never clipped by cards or scroll containers */
const glTip=document.createElement('div');glTip.id='gltip';document.body.appendChild(glTip);
function glShow(elm){const term=elm.dataset.term;if(!TERMS[term])return;glTip.innerHTML='';const b=document.createElement('b');b.textContent=term;glTip.appendChild(b);glTip.appendChild(document.createTextNode(TERMS[term]));
 glTip.classList.add('show');const r=elm.getBoundingClientRect();glTip.style.visibility='hidden';glTip.style.left='0';glTip.style.top='0';
 requestAnimationFrame(()=>{const tw=glTip.offsetWidth,th=glTip.offsetHeight;let x=r.left,y=r.top-th-8;if(x+tw>innerWidth-8)x=innerWidth-8-tw;if(x<8)x=8;if(y<8)y=r.bottom+8;glTip.style.left=x+'px';glTip.style.top=y+'px';glTip.style.visibility='visible'});}
function glHide(){glTip.classList.remove('show');}
document.addEventListener('mouseover',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g)glShow(g);});
document.addEventListener('mouseout',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g)glHide();});
document.addEventListener('focusin',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g)glShow(g);});
document.addEventListener('focusout',glHide);document.addEventListener('click',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g){glShow(g)}else{glHide()}});
document.addEventListener('scroll',glHide,true);
let glObserver=null;
function startGlossary(){const root=el("#main");
 const run=()=>{if(glObserver)glObserver.disconnect();try{glossaryDecorate(root)}catch(e){}if(glObserver)glObserver.observe(root,{childList:true,subtree:true})};
 glObserver=new MutationObserver(run);run();}

buildNav();renderPresence();updBadges();setView("overview");startGlossary();
window.addEventListener("resize",()=>{if(state.view==="landscape"&&el("#lsCanvas")){LS_fit();LS_draw()}});
