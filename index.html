<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>KPIs, Definitions &amp; Glossary</h1><p class="sub">How the platform measures itself, and the terms used across Foresight.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">KPIs & glossary</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / KPIs & glossary</p>

<p class="lead">This document defines how the platform measures itself and explains the terms used across Foresight. It sits behind the <em>KPIs &amp; glossary</em> tab.</p>

<h2>Key performance indicators</h2>
<table>
<tr><th>KPI</th><th>What it measures</th><th>How read</th></tr>
<tr><td><b>Time to validate</b></td><td>Detection to a validated signal.</td><td>Days, not weeks · lower is better, within quality limits. <span class="tc">target to confirm</span></td></tr>
<tr><td><b>Coverage</b></td><td>Share of relevant IEC committees and sectors with active signals.</td><td>Read alongside empty facets; gaps are shown, not hidden.</td></tr>
<tr><td><b>Corroboration depth</b></td><td>Independent sources behind a typical validated signal.</td><td>Higher and more varied is stronger.</td></tr>
<tr><td><b>Override rate</b></td><td>How often analysts change a proposed label.</td><td>A healthy middle · too high means weak proposals, too low risks automation bias.</td></tr>
<tr><td><b>Freshness</b></td><td>How current the source feeds are.</td><td>Stale feeds are flagged; a dark source raises an alert.</td></tr>
<tr><td><b>Precision of alerts</b></td><td>Share of alerts an analyst judges worth acting on.</td><td>Guards against alert fatigue.</td></tr>
</table>
<p class="note">KPIs describe the health of the process. None of them is a forecast, and none feeds back into a signal's classification. <span class="tc">Target bands to be agreed with IEC.</span></p>

<h2>Glossary</h2>
<div class="kv">
<dt>Weak signal</dt><dd>A faint, early sign of change, caught before it is obvious.</dd>
<dt>Building</dt><dd>A signal gathering corroboration and maturity, not yet settled.</dd>
<dt>Established</dt><dd>A well-corroborated, mature signal whose sources agree.</dd>
<dt>Classification</dt><dd>Assigning a signal one of the three labels above · a judgement, not a score.</dd>
<dt>Corroboration</dt><dd>How many independent, varied sources support a signal.</dd>
<dt>Momentum</dt><dd>Whether the evidence for a signal is building, steady or accelerating.</dd>
<dt>Maturity / TRL</dt><dd>Technology Readiness Level, 1 (idea) to 9 (in everyday use).</dd>
<dt>Horizon</dt><dd>Time-to-mainstream read: now, 2–4 years, or 5+ years.</dd>
<dt>Provenance</dt><dd>The traceable record of where a fact came from.</dd>
<dt>Grounding (RAG)</dt><dd>Retrieval-augmented generation: tying the model to fetched sources so it uses real documents, not its memory.</dd>
<dt>Agentic AI</dt><dd>Programs that take actions with tools, in steps, within limits.</dd>
<dt>Generative AI</dt><dd>Models that draft and summarise text.</dd>
<dt>Automation bias</dt><dd>Trusting the machine without checking it.</dd>
<dt>Override log</dt><dd>The record of every label change · who, when and why.</dd>
<dt>Lens</dt><dd>One of the four views on a signal: technology, market, regulatory, geopolitical.</dd>
<dt>Facet</dt><dd>A sub-area within a lens (for example, grids or storage within technology).</dd>
<dt>RACI</dt><dd>Responsible, Accountable, Consulted, Informed · a map of who owns each step.</dd>
<dt>NWIP</dt><dd>New Work Item Proposal · how new IEC standards work begins.</dd>
<dt>IECEE / IECEx / IECRE</dt><dd>IEC conformity-assessment schemes for equipment safety, explosive atmospheres and renewable energy.</dd>
</div>

</div></body></html>`,

<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>Source Universe &amp; Credibility Tiers</h1><p class="sub">What Foresight means by “the internet” · the bounded, tiered set of sources its agents read. For the Board to validate.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">Source universe</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / Source universe</p>

<p class="lead">This document defines what Foresight means by "the internet" · the bounded, tiered set of sources its agents are allowed to read. The Board is asked to <b>validate this list</b>: add, remove or re-tier sources, confirm languages, and decide the licensed-feed scope.</p>
<div class="rule"><b>Not the open web.</b> Agents read a curated, credibility-tiered source universe, not everything online. A defined universe is what makes coverage auditable and corroboration meaningful.</div>

<h2>Credibility tiers</h2>
<h3>Tier A · primary &amp; authoritative</h3>
<p>The backbone. Used directly and trusted as primary evidence.</p>
<ul>
<li>Standards and technical bodies · IEC, ISO, ITU, IEEE, CENELEC, ETSI, and national standards bodies.</li>
<li>IEC conformity systems · IECEE, IECEx, IECQ, IECRE.</li>
<li>Regulators and official journals · EUR-Lex, the US Federal Register, national regulators, NIST.</li>
<li>Patents and scholarly records · WIPO, EPO, USPTO; Crossref and indexed journals.</li>
<li>Official statistics and energy/industry agencies · IEA, IRENA, OECD.</li>
<li>Company primary filings · e.g. SEC EDGAR and equivalent registries.</li>
</ul>
<h3>Tier B · corroborating</h3>
<p>Reputable sources used to confirm and add context, not to originate a signal on their own.</p>
<ul>
<li>Industry consortia and technical groups · e.g. CharIN, CSA, OPC Foundation, CIGRE.</li>
<li>Research institutes and labs · e.g. Fraunhofer, NREL, EPRI.</li>
<li>Pre-print and conference records · e.g. arXiv.</li>
<li>Established newswires · e.g. Reuters, Bloomberg, AP.</li>
</ul>
<h3>Tier C · leading but unconfirmed</h3>
<p>Earliest sightings. Useful for catching weak signals early, but <b>never stand alone</b> · a Tier C item must be corroborated by Tier A or B before it can be validated.</p>
<ul>
<li>Trade and specialist press.</li>
<li>Vendor announcements and press releases.</li>
<li>Expert blogs and reputable commentary.</li>
</ul>

<h2>How tiers combine into corroboration</h2>
<p>The "who else says so?" question in the classification method depends on this structure. A signal seen only in Tier C is early and weak by definition. As independent Tier A and B sources confirm it, corroboration deepens and the signal can move toward building or established. Independence matters: five outlets reprinting one press release count as one source, not five.</p>

<h2>What gets selected: the inclusion filter</h2>
<p>The sources above are large, and most of what they publish is not a signal. Out of that flow, an item is pulled in and tagged only if it passes a short inclusion filter. This is what keeps the watch list about genuine change rather than daily noise.</p>
<p>An item becomes a candidate signal when it is:</p>
<ul>
<li><b>On topic.</b> It concerns one of the twelve IEC electrotechnical domains and maps to a committee\'s remit. Off-topic material is dropped.</li>
<li><b>A development, not a mention.</b> It reports something new, moving or shifting: a first demonstration, a standard opening, a rule changing, a market moving. Routine coverage, restated old news and pure opinion do not qualify.</li>
<li><b>Material to standards work.</b> It could plausibly affect what an IEC committee does. Interesting but immaterial items are left out.</li>
<li><b>Traceable to the tiered universe.</b> It comes from a Tier A, B or C source, with the tier rules applied. A Tier C item on its own is logged but not validated until Tier A or B confirms it.</li>
<li><b>Not a duplicate.</b> Near-identical reports collapse into one signal, so several outlets carrying the same release count once.</li>
</ul>
<p>In the live build, cheap embeddings screen every incoming item for domain relevance first, dropping most of the volume; only the survivors get a closer read that confirms a real development and assigns a provisional domain and facet. That ordering, a cheap filter before the costly step, is also what keeps the running cost defensible. In this prototype, the 48 example signals were hand-selected against exactly this standard, so you can see the kind of item that qualifies.</p>

<h2>Languages in scope <span class="tc">to confirm</span></h2>
<p>Electrotechnology moves in more than English. A German, Japanese, Korean, Chinese or French filing should be caught at source, not lost in translation. Proposed working set: English plus Chinese, German, Japanese, Korean and French. Signals carry their source language so the original is always traceable. The exact language set is a funding and capability decision for the Board to confirm.</p>

<h2>Licensed feeds <span class="tc">to confirm</span></h2>
<p>Some of the most valuable sources · certain patent analytics, market data and standards databases · are licensed rather than open. Which of these to subscribe to is a procurement decision that shapes both coverage and cost. This document flags the choice; it does not assume it.</p>

<h2>The primary-source standard</h2>
<p>Where a figure or claim matters, the platform holds it to a primary-source standard: the exact source, a working link, and an archived copy where possible. Third-party or aggregated figures are flagged as such rather than presented as primary. This is the same discipline applied across Evalueserve's competitive-intelligence work.</p>

<h2>Explicitly out of scope</h2>
<ul>
<li>Open-web crawling beyond the allowed-source list.</li>
<li>Social-media chatter as a primary source.</li>
<li>Anything that cannot be tied back to a citable source.</li>
</ul>

<h2>What the Board is asked to validate</h2>
<ol>
<li>Are the Tier A sources the right authoritative backbone for IEC's remit?</li>
<li>Anything to add or remove in Tier B and C?</li>
<li>Confirm the language set.</li>
<li>Decide the licensed-feed scope for the funded build.</li>
</ol>

function LS_rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function LS_layout(){
 const rnd=LS_rng(20260630);const GA=Math.PI*(3-Math.sqrt(5));const anc={};
 SECTORS.forEach((s,i)=>{const r=Math.sqrt((i+0.5)/SECTORS.length)*0.42,th=i*GA;anc[s.key]=[0.5+r*Math.cos(th),0.5+r*Math.sin(th)]});
 const P={};SIGNALS.forEach(s=>{const a=anc[s.sector]||[0.5,0.5];P[s.id]=[a[0]+(rnd()-0.5)*0.08,a[1]+(rnd()-0.5)*0.08]});
 const share=(a,b)=>a.comm&&b.comm&&a.comm.some(c=>b.comm.includes(c));
 for(let it=0;it<360;it++){
  const disp={};SIGNALS.forEach(s=>disp[s.id]=[0,0]);
  for(let i=0;i<SIGNALS.length;i++)for(let j=i+1;j<SIGNALS.length;j++){
   const A=SIGNALS[i],B=SIGNALS[j];let dx=P[A.id][0]-P[B.id][0],dy=P[A.id][1]-P[B.id][1];let d2=dx*dx+dy*dy+1e-6,d=Math.sqrt(d2);
   const rep=0.00045/d2;dx/=d;dy/=d;disp[A.id][0]+=dx*rep;disp[A.id][1]+=dy*rep;disp[B.id][0]-=dx*rep;disp[B.id][1]-=dy*rep;
   if(share(A,B)){const spr=(d-0.06)*0.02;disp[A.id][0]-=dx*spr;disp[A.id][1]-=dy*spr;disp[B.id][0]+=dx*spr;disp[B.id][1]+=dy*spr}
  }
  SIGNALS.forEach(s=>{const a=anc[s.sector];disp[s.id][0]+=(a[0]-P[s.id][0])*0.06;disp[s.id][1]+=(a[1]-P[s.id][1])*0.06});
  const cool=1-it/360;SIGNALS.forEach(s=>{P[s.id][0]+=Math.max(-0.02,Math.min(0.02,disp[s.id][0]))*cool;P[s.id][1]+=Math.max(-0.02,Math.min(0.02,disp[s.id][1]))*cool});
 }
 const xs=SIGNALS.map(s=>P[s.id][0]),ys=SIGNALS.map(s=>P[s.id][1]);
 const mnx=Math.min(...xs),mxx=Math.max(...xs),mny=Math.min(...ys),mxy=Math.max(...ys);
 SIGNALS.forEach(s=>{P[s.id][0]=(P[s.id][0]-mnx)/(mxx-mnx||1);P[s.id][1]=(P[s.id][1]-mny)/(mxy-mny||1)});
 LSTATE.edges=[];for(let i=0;i<SIGNALS.length;i++)for(let j=i+1;j<SIGNALS.length;j++){if(share(SIGNALS[i],SIGNALS[j]))LSTATE.edges.push([SIGNALS[i].id,SIGNALS[j].id])}
 LSTATE.pos=P;LSTATE.n=SIGNALS.length;
}

 el("#lsLead").setAttribute("viewBox","0 0 "+r.width+" "+r.height);
 const gut=r.width<720?92:162,padY=42,s=Math.min(r.width-2*gut,r.height-2*padY);
 const offX=gut+((r.width-2*gut)-s)/2,offY=padY+((r.height-2*padY)-s)/2;
 LSTATE.tx=x=>offX+x*s;LSTATE.ty=y=>offY+y*s;LSTATE.gut=gut;

 tech:{title:"Technology Signals",sub:"Capability shifts: what can now be done, or done better, and how far it has been proven.",

/* KNOWLEDGE GRAPH · standard practice, not a bespoke drawing.
   Data model: a labelled property graph, serialised as JSON-LD, reusing published vocabularies
   rather than coining our own. An IEC audience recognises all of these:
     PROV-O      (W3C)  provenance: who or what generated each edge, and from what
     SKOS        (W3C)  the domain and committee taxonomies as concept schemes
     Dublin Core        source documents
   Visualisation: Cytoscape.js with named layouts (CoSE, a Compound Spring Embedder) and its
   standard graph analytics (degree centrality, betweenness centrality). Nothing is hand-placed. */
const KG_CONTEXT={
 "@vocab":"https://evalueserve.com/foresight#",
 "prov":"http://www.w3.org/ns/prov#",
 "skos":"http://www.w3.org/2004/02/skos/core#",
 "dcterms":"http://purl.org/dc/terms/"
};
function kgModel(){
 const nodes=[],edges=[];
 SIGNALS.forEach(s=>nodes.push({data:{id:"sig:"+s.id,kind:"signal",label:s.t,lens:s.q,
   domain:s.sector,color:(SECTOR_BY[s.sector]||{}).color||"#776ea9",cls:s.cls,imp:s.imp,src:s.src}}));
 Object.keys(COMM).forEach(c=>{const v=COMM[c],d=v.indexOf(" \u00b7 ");
  nodes.push({data:{id:"tc:"+c,kind:"committee",label:d>0?v.slice(0,d):v,scope:d>0?v.slice(d+3):"",code:c}})});
 SIGNALS.forEach(s=>(s.comm||[]).forEach(c=>{
  edges.push({data:{id:"e:"+s.id+":"+c,source:"sig:"+s.id,target:"tc:"+c,rel:"affects",
    generatedBy:"analyst",derivedFrom:s.src+" sources"}})}));
 return {nodes,edges};
}
function kgJSONLD(){
 const M=kgModel();
 const g=[];
 SIGNALS.forEach(s=>g.push({"@id":"sig:"+s.id,"@type":"Signal","dcterms:title":s.t,
   "lens":Q[s.q],"maturityLabel":CLSLABEL[s.cls],"judgedOn":s.basis==="trl"?"TRL "+s.trl:"Maturity stage: "+STAGE_LABEL[s.ring],
   "skos:broader":{"@id":"domain:"+s.sector},
   "affects":(s.comm||[]).map(c=>({"@id":"tc:"+c})),
   "prov:wasGeneratedBy":{"@type":"prov:Activity","prov:wasAssociatedWith":{"@id":"role:analyst"}},
   "prov:wasDerivedFrom":s.src+" independent sources"}));
 SECTORS.forEach(d=>g.push({"@id":"domain:"+d.key,"@type":"skos:Concept","skos:prefLabel":d.name}));
 Object.keys(COMM).forEach(c=>{const v=COMM[c],i=v.indexOf(" \u00b7 ");
  g.push({"@id":"tc:"+c,"@type":["Committee","skos:Concept"],"skos:prefLabel":i>0?v.slice(0,i):v,"skos:definition":i>0?v.slice(i+3):""})});
 return JSON.stringify({"@context":KG_CONTEXT,"@graph":g},null,1);
}
let CY=null;
function kgAnalytics(){
 const M=kgModel();
 const cy=cytoscape({headless:true,elements:[...M.nodes,...M.edges]});
 const bc=cy.elements().betweennessCentrality({directed:false});
 const rows=cy.nodes('[kind="committee"]').map(n=>({
   id:n.id(),label:n.data("label"),scope:n.data("scope"),
   deg:n.degree(false),
   btw:bc.betweenness(n),
   domains:(()=>{const ds=new Set();n.connectedEdges().connectedNodes('[kind="signal"]').forEach(x=>ds.add(x.data("domain")));return ds.size})(),
   established:n.connectedEdges().connectedNodes('[kind="signal"]').filter(x=>x.data("cls")==="strong").length
 })).filter(r=>r.deg>0);
 return {
  exposed: rows.slice().sort((a,b)=>b.deg-a.deg||b.established-a.established).slice(0,5),
  brokers: rows.slice().filter(r=>r.domains>1).sort((a,b)=>b.btw-a.btw||b.domains-a.domains).slice(0,5),
  n: rows.length
 };
}
function kgRender(){
 const host=document.getElementById("cyhost"); if(!host||typeof cytoscape!=="function")return;
 const M=kgModel();
 let els;
 if(state.graphMode==="ego"){
  const id=state.graphSig||SIGNALS.slice().sort((a,b)=>b.imp-a.imp)[0].id;
  const keepC=new Set(("sig:"+id)&&(sigById(id).comm||[]).map(c=>"tc:"+c));
  const keepS=new Set(["sig:"+id]);
  M.edges.forEach(e=>{if(keepC.has(e.data.target))keepS.add(e.data.source)});
  els=[...M.nodes.filter(n=>keepS.has(n.data.id)||keepC.has(n.data.id)),
       ...M.edges.filter(e=>keepS.has(e.data.source)&&keepC.has(e.data.target))];
 } else {
  const deg={};M.edges.forEach(e=>{deg[e.data.source]=(deg[e.data.source]||0)+1;deg[e.data.target]=(deg[e.data.target]||0)+1});
  els=[...M.nodes.filter(n=>deg[n.data.id]),...M.edges];
 }
 if(CY){try{CY.destroy()}catch(e){}}
 CY=cytoscape({
  container:host, elements:els, wheelSensitivity:0.25,
  style:[
   {selector:'node[kind="signal"]',style:{'background-color':'data(color)','label':'data(label)',
     'width':'mapData(imp,1,4,16,34)','height':'mapData(imp,1,4,16,34)',
     'font-size':'9px','font-family':'var(--fd)','color':'#3c2944','text-wrap':'wrap','text-max-width':'110px',
     'text-valign':'bottom','text-margin-y':4,'text-background-color':'#fff','text-background-opacity':0.82,
     'text-background-padding':'2px','text-background-shape':'roundrectangle'}},
   {selector:'node[kind="committee"]',style:{'shape':'round-rectangle','background-color':'#fff',
     'border-color':'#e0044e','border-width':1.3,'label':'data(label)','width':'label','height':18,
     'padding':'6px','font-size':'9.5px','font-family':'var(--fm)','color':'#e0044e','text-valign':'center'}},
   {selector:'edge',style:{'width':1.1,'line-color':'#cbbfd4','curve-style':'straight','opacity':0.75,
     'target-arrow-shape':'triangle','target-arrow-color':'#cbbfd4','arrow-scale':0.6}},
   {selector:'node:selected',style:{'border-color':'#43224d','border-width':3}},
   {selector:'.dim',style:{'opacity':0.12}}
  ],
  layout: state.graphMode==="ego"
    ? {name:'concentric',concentric:n=>(n.data('kind')==='signal'&&n.id()==='sig:'+(state.graphSig||''))?10:(n.data('kind')==='committee'?5:1),levelWidth:()=>1,minNodeSpacing:54,padding:34,animate:false}
    : {name:'cose',idealEdgeLength:78,nodeOverlap:14,nodeRepulsion:9000,gravity:0.5,numIter:900,padding:26,animate:false}
 });
 CY.on('tap','node[kind="signal"]',e=>{const id=e.target.id().slice(4);openSignal(id)});
 CY.on('tap','node[kind="committee"]',e=>{
   const n=e.target;CY.elements().addClass('dim');
   n.removeClass('dim');n.connectedEdges().removeClass('dim').connectedNodes().removeClass('dim');
 });
 CY.on('tap',e=>{if(e.target===CY)CY.elements().removeClass('dim')});
}

 const exposed=A.exposed.map(r=>`<div class="kgp"><span class="kgp-c">${r.label}</span><span class="kgp-n">${r.deg} signal${r.deg>1?"s":""} attached${r.established?`, ${r.established} established`:""}</span></div>`).join("");
 const brokers=A.brokers.map(r=>`<div class="kgp"><span class="kgp-c">${r.label}</span><span class="kgp-n">spans ${r.domains} domains</span><span class="kgp-f">broker</span></div>`).join("")

V.howitworks=()=>{
 const tabs=[["loop","Operating loop"],["agentic","Agents & automation"],["sources","Sources & coverage"],["method","Classification method"],["human","Human supervision"],["controls","Controls & risk"],["kpi","KPIs & glossary"]];
 const t=state.opTab;
 const head=`<div class="crumb">Operate / How it works</div><div class="phead"><h1>How it works</h1><div class="sub">Software scans, sorts and drafts. A named analyst reviews and decides what is published.</div><div class="right"><span class="buildstamp" id="ppB">Prototype build 2026-07-13 · ${SIGNALS.length} curated signals · agents designed, not switched on</span></div></div>
 <div class="subtabs">${tabs.map(x=>`<button class="subtab ${t===x[0]?'on':''}" data-action="optab" data-tab="${x[0]}">${x[1]}</button>`).join("")}</div>`;
 let body="";
if(t==="sources"){body=`
  <div class="card"><h3>How current the tool is</h3><div class="pad" style="font-size:12.5px;color:#3c2944;line-height:1.65">
   The signal set was curated as of <b>${fmtDate(AS_OF)}</b>. Nothing has been added since, because the ingestion pipeline is not switched on.
   <div style="margin-top:8px"><b>Currency is a property of the pipeline, not of a model.</b> The tool does not recall signals from training data. Agents read sources and an analyst validates what they return. When the pipeline runs, the most recent signal is as old as the most recent source, and no retraining is involved.</div>
   <div class="hw-note2" style="margin-top:9px"><b>Intended cadence, to confirm with the Board.</b> Ingestion daily. Re-classification weekly. Full method review quarterly. The reference window on the overview is currently ${WINDOW_DAYS} days; it should be replaced by the interval between Board meetings, which is the period in which the Board's own decisions are made.</div>
  </div></div>
  <div class="card" style="margin-top:18px"><h3>How the coverage is established</h3><div class="pad" style="font-size:12.5px;color:#3c2944;line-height:1.65">
   <b>Coverage is claimed against a declared frame, not against the world.</b> Recall against that frame is then measured. An exhaustiveness claim cannot be tested; a recall figure can.
   <div class="drv" style="margin-top:9px"><b>1. Declare the frame</b> \u00b7 which domains, which jurisdictions, which languages, which source types. Coverage is a fraction, and this is its denominator.</div>
   <div class="drv"><b>2. Build the register by enumeration, not by search</b> \u00b7 every IEC committee and its liaisons, every national committee, the recognised standards bodies, the patent offices covering the jurisdictions in scope, the regulators in those jurisdictions, the journal set indexed for each domain. Search returns only what is already known to the searcher and provides no denominator. Enumeration provides one.</div>
   <div class="drv"><b>3. Measure recall three ways</b>
    <span style="display:block;margin-top:4px">\u00b7 <b>Back-test.</b> Take the last eighteen to twenty-four months of items the Board actually acted on. Would the register have caught each one, and how many months early? That is a recall percentage and a lead time, both defensible numbers.</span>
    <span style="display:block">\u00b7 <b>Blind-spot probe.</b> Ask each committee secretary for the two things that surprised them last year, and check whether the register covers them.</span>
    <span style="display:block">\u00b7 <b>Saturation.</b> Follow citations outward from a captured set until new sources stop appearing. The saturation curve is the evidence of closure.</span>
   </div>
   <div class="drv"><b>4. Let the tool maintain the register</b> \u00b7 every signal records which source first caught it. That gives source yield, unique first-catch rate, and dead sources. A source that never produces a unique first catch is retired. A signal that arrives from outside the register triggers a review of the register.</div>
   <div class="hw-note2" style="margin-top:10px"><b>Two declared limitations:</b> non-English sources, and paywalled or licensed feeds. Both are scope decisions with a cost, and both are for the Board to set.</div>
   <div class="hw-note2" style="margin-top:8px"><b>To confirm with the Board.</b> More sources means more noise and more analyst load. Beyond a point, additional sources reduce precision. The question is therefore <b>what miss rate is acceptable, and what false-positive rate is tolerable to achieve it</b>. That ratio is a governance decision and is required from the Board.</div>
  </div></div>
  <div class="card" style="margin-top:18px"><h3>How a source is assigned to a tier</h3><div class="pad" style="font-size:12.5px;color:#3c2944;line-height:1.65">
   <b>The source is tiered once, at registration, by publisher class, by a named person, with the reason recorded.</b> Items inherit the tier of their source. Item-by-item tiering is not auditable and does not hold as volume rises.
   <div style="margin-top:9px">The test that makes it deterministic: <b>if this turns out to be wrong, who is accountable, and is there a correction mechanism?</b></div>
   <div class="stagerub">
    <div class="stagerub-r"><span class="stagerub-n">Tier A</span><span class="stagerub-d">The source <b>is</b> the primary record of the fact. IEC, ISO and IEEE texts, new work item proposals, official regulatory texts, patent registers, company filings.<span class="stagerub-e">Accountable: the issuing authority.</span></span></div>
    <div class="stagerub-r"><span class="stagerub-n">Tier B</span><span class="stagerub-d">Independent evidence with editorial or peer accountability. Peer-reviewed journals, national laboratories, institutional reports, trade press with named editors.<span class="stagerub-e">Accountable: an editor or a reviewer.</span></span></div>
    <div class="stagerub-r"><span class="stagerub-n">Tier C</span><span class="stagerub-d">A leading indicator, unverified. Vendor announcements, conference abstracts, analyst notes without a stated method, posts.<span class="stagerub-e">Accountable: nobody.</span></span></div>
   </div>
   <div style="margin-top:12px"><b>Three edge cases, recorded so that they are applied consistently:</b></div>
   <div class="drv" style="margin-top:6px">A Tier A body <b>quoted in</b> Tier C press stays Tier C until the primary is retrieved. The primary source is retrieved before the claim is made.</div>
   <div class="drv">A vendor filing is <b>Tier A for what the vendor claims</b> and <b>Tier C for whether it works</b>. The tier attaches to the claim type, not to the document.</div>
   <div class="drv">Aggregators and newswires carry no tier. They are references to a source, not a source.</div>
   <div style="margin-top:10px"><b>A Tier C item never stands alone.</b> It needs Tier A or B corroboration before an analyst can validate it. This prevents an unverified vendor claim from being published as established.</div>
   <div class="hw-note2" style="margin-top:10px"><b>A limitation of this rule.</b> Tiering by publisher favours incumbents, and a weak signal typically appears first in Tier C. Tiering therefore governs what may be published as established. It is not used to exclude Tier C material, since weak signals are the object of the exercise.</div>
  </div></div>`}
 else if(t==="loop"){body=`${foundationsBand(true)}<span class="run-eyebrow">Runs continuously \u00b7 who does the work, step by step</span><div class="actors">${ACTORS.map(a=>`<div class="actor"><div class="at" style="background:${a.c}">${a.n}<small>${a.s}</small></div><div class="ab">${a.is}<div class="lbl">Does</div><ul>${a.does.map(d=>`<li>${d}</li>`).join("")}</ul><div class="lbl">Never</div><ul>${a.not.map(d=>`<li>${d}</li>`).join("")}</ul></div></div>`).join("")}</div>
  <div class="flow6">${LOOP.map(l=>`<div class="fstep"><div class="n">${l.n}</div><h5>${l.t}</h5><p>${l.p}</p><div class="who">${l.w}</div></div>`).join("")}</div>
  <div class="card" style="margin-top:18px"><h3>How the loop learns \u00b7 continuous improvement</h3><div class="pad">
   <div class="srcnote" style="padding:0 0 8px">The loop does not just run, it improves. Software proposes, people decide, and every decision is fed back so the next one is better. This is the fifth foundation, and unlike the other four it never stops.</div>
   <div class="mech"><b>Re-feed</b><div>Every analyst accept or override is logged with its evidence, building a growing, proprietary record of validated signals.</div></div>
   <div class="mech"><b>Test</b><div>With no external ground truth, the system is measured by how often the model's proposal matches the analyst's decision, tracked per domain and over time. Falling agreement flags a problem.</div></div>
   <div class="mech"><b>Watch for drift</b><div>Source formats change, new technology categories appear and embeddings age. These are monitored, and the models are re-embedded and re-prompted on a cadence.</div></div>
   <div class="mech"><b>Fail safe</b><div>Low-agreement or low-confidence items route to a human automatically, so the system degrades toward more human review, never toward silent error.</div></div>
   <div class="mech"><b>Improve</b><div>The accumulating decision record is the moat: it earns the right to fine-tune the models later, and it makes the tool more defensible the longer it runs.</div></div>
   <div class="srcnote">Designed, not yet live: today the tool runs on ${SIGNALS.length} curated signals, so the learning loop is specified but not switched on. It starts when live scanning and human validation begin, as part of the funded build.</div>
  </div></div>
  ${rn('<b>Automation with oversight:</b> agents handle the routine steps between stages, which speeds the work but concentrates risk, since an automated step can act quickly and at scale. Logging, action limits and human review at each gate keep that in check.')}`}
 else if(t==="agentic"){
  const OPMETA=[
   ["Monitor",'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'],
   ["Extract & tag",'<path d="M20 12l-8 8-9-9V4h7z"/><circle cx="7.5" cy="7.5" r="1.3"/>'],
   ["Triage",'<path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/>'],
   ["Cross-check",'<path d="M12 3l7 3v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6z"/><path d="M9 12l2 2 4-4"/>'],
   ["Route",'<circle cx="6" cy="12" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M8 12h4l4-6M12 12l4 6"/>'],
   ["Draft",'<path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/><path d="M9 13h7M9 17h5"/>'],
   ["Alert",'<path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M10 21a2 2 0 0 0 4 0"/>']
  ];
  const PIPE=AGENTS.slice(0,7),SUP=AGENTS[7];
  const opstages=PIPE.map((a,i)=>{const g=a[2]==="Gated";return `<div class="opl-stage ${g?'gated':'full'}"><div class="opl-tip"><b>Escalates when</b>${a[3]}</div><div class="opl-ico"><svg viewBox="0 0 24 24">${OPMETA[i][1]}</svg></div><div class="opl-nm">${OPMETA[i][0]}</div><span class="opl-tier ${g?'gated':'full'}">${a[2]}</span></div>`}).join("");
  body=`${foundationsMini()}<div class="card"><h3>The operating loop · one signal, end to end</h3><div class="pad">
  <div class="srcnote" style="padding:0 0 4px">A signal (the moving dot) is watched, extracted, clustered, checked, routed, drafted and alerted. Hover any step to see when it hands off to a person.</div>
  <div class="oploop"><div class="opl-track"></div><div class="opl-token"></div><div class="opl-stages">${opstages}</div></div>

  </div></div>
  ${rn('<b>Designed, not yet live.</b> Today the loop runs on '+SIGNALS.length+' curated example signals so you can see how it behaves. Switching on live scanning and the agents is the funded build. Each agent already carries a defined autonomy level and an escalation trigger · the two gated steps always pass a named person.')}
  <div class="card" style="margin-top:18px"><h3>Agent roster<span class="c">${AGENTS.length}</span></h3><table class="raci"><tr><th style="text-align:left">Agent</th><th style="text-align:left">Job</th><th>Autonomy</th><th style="text-align:left">Escalates when</th></tr>${AGENTS.map(a=>`<tr><td style="text-align:left;font-weight:600;color:var(--purple)">${a[0]}</td><td style="text-align:left">${a[1]}</td><td><span class="pillstat" style="background:#efe4f4;color:var(--purple)">${a[2]}</span></td><td style="text-align:left">${a[3]}</td></tr>`).join("")}</table></div>

  ${rn('<b>Grounding (RAG):</b> the model may only use facts fetched from source documents, not its own memory, and every claim must link to a source. This adds a small processing step and keeps each statement traceable.')}
  ${docCallout('source-universe.html','Source Universe & Credibility Tiers','The bounded, tiered list of sources the agents may read: Tier A primary, B corroborating, C unconfirmed: plus languages and licensed feeds. For the Board to validate.')}`}
 else if(t==="method"){
  const ex=(name,col,t2,chips,note)=>`<div class="worked"><div style="font-family:var(--fm);font-size:10px;color:${col};text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Worked example · ${name}</div><b style="color:var(--purple)">${t2}</b><div class="chips2">${chips.map(c=>`<span>${c}</span>`).join("")}</div><div style="font-size:11.5px;color:var(--muted);margin-top:8px">${note}</div></div>`;
  const MEASURES=[
   ["Novelty","Is it new?","Highest for something just surfaced, lowest for something already established and long-tracked.","Live: first-seen detection against the watch list. Prototype: read from the maturity stage and the new flag.","Analyst-set","estimate"],
   ["Momentum","Is it moving?","Steady, building or accelerating. Accelerating means mentions and independent sources are rising over time.","Live: the trend in how often the signal appears across sources. Prototype: an analyst-set band.","Analyst-set","estimate"],
   ["Corroboration","Who else says so?","Rises with the number of independent sources that agree. Several outlets reprinting one release count as one, and Tier C sources never stand alone.","Computed from the independent source count; independence enforced by the source universe.","Computed","computed"],
   ["Maturity (TRL)","How proven is it?","The TRL band, 1 to 9, read from the evidence: papers and patents low, pilots and demonstrators middle, deployments and standards high. Kept separate from impact.","TRL band read from evidence then analyst-confirmed; the maturity score is TRL over nine.","Computed","computed"],
   ["Reach","How far does it reach?","Counted from the IEC committees and sectors the signal maps to. Sets priority, not the label.","Computed from the committee mapping on the signal.","Computed","computed"],
   ["Confidence","How sure is the reading?","How much to trust the reading itself: higher when sources are strong-tier and agree, lower when evidence is thin, single-tier or contradictory. An established label needs high confidence.","Live: from source quality and agreement. Prototype: an analyst-set percentage.","Analyst-set","estimate"]
  ];
  const lensCard=`<div class="card"><h3>Placing the signal: which lens, and which facet</h3><div class="pad"><div class="srcnote" style="padding:0 0 8px">A signal is classified on two axes. First it is placed: which of the four lenses it sits under, and which facet within that lens. Then it is assessed with the weak, building or established label. This section covers placing; the questions below cover assessing.</div>
<div class="msr"><div class="msr-h"><span class="msr-n">Technology</span><span class="msr-q">Can something now be done, or done better?</span></div><div class="msr-d">A capability advancing: a device, material, method or architecture maturing.</div><div class="fctlist">${FACETS.tech.map(f=>'<div class="fctd"><b>'+f.short+'</b> '+(TERMS[f.short]||'')+'</div>').join('')}</div></div>
<div class="msr"><div class="msr-h"><span class="msr-n">Market</span><span class="msr-q">Is it about money, demand, supply or competition?</span></div><div class="msr-d">A commercial force shifting: demand, investment, manufacturing, deployment or rivalry.</div><div class="fctlist">${FACETS.market.map(f=>'<div class="fctd"><b>'+f.short+'</b> '+(TERMS[f.short]||'')+'</div>').join('')}</div></div>
<div class="msr"><div class="msr-h"><span class="msr-n">Regulatory</span><span class="msr-q">Is a rule, standard or requirement changing?</span></div><div class="msr-d">A standard opening or revising, or a safety, cyber or environmental duty changing.</div><div class="fctlist">${FACETS.reg.map(f=>'<div class="fctd"><b>'+f.short+'</b> '+(TERMS[f.short]||'')+'</div>').join('')}</div></div>
<div class="msr"><div class="msr-h"><span class="msr-n">Geopolitical</span><span class="msr-q">Is it about trade, materials, borders or national policy?</span></div><div class="msr-d">A cross-border or strategic dynamic: trade controls, critical materials, sovereignty.</div><div class="fctlist">${FACETS.geo.map(f=>'<div class="fctd"><b>'+f.short+'</b> '+(TERMS[f.short]||'')+'</div>').join('')}</div></div>
<div class="drv" style="margin-top:8px"><b>The rule.</b> A development often touches more than one lens. It is placed under the one that is its primary driver, the thing that is actually changing, and the analyst records the call. Like the label, the placement can be challenged.</div>
<div class="drv"><b>Worked example.</b> "Active-assisted-living platforms gain standards" reads at first like Regulatory, but what is driving it is a maturing market with vendors competing to set the pattern, so it is placed under Market, Competition; the standards follow the market. A different analyst might argue Regulatory, which is exactly the kind of call the Board can review.</div>
<div class="srcnote">In the live build the extraction agent proposes the lens and facet from the content and an analyst confirms. In this prototype both are analyst-set.</div>
</div></div>`;
  body=`${lensCard}<div class="card"><h3>How a signal is classified · the questions we ask</h3><div class="srcnote" style="padding:11px 15px 0">Nothing is scored or forecast. The label comes from weighing these five questions, not a single number. How each measure is read, and how they combine into a label, is set out below.</div><div class="pad">${RUBRIC.map(r=>`<div class="feat"><div class="fn">${r[0]}</div><div class="fd">${r[1]}</div><div class="fw" style="color:var(--muted);text-align:right;min-width:210px">${r[2]}</div></div>`).join("")}</div></div>
  <div class="card" style="margin-top:18px"><h3>How each measure is read</h3><div class="pad"><div class="srcnote" style="padding:0 0 8px">Each question rests on one measure. Here is how each is read, and whether it is computed or set by an analyst in this prototype.</div>${MEASURES.map(m=>`<div class="msr"><div class="msr-h"><span class="msr-n">${m[0]}</span><span class="msr-q">${m[1]}</span><span class="msr-tag ${m[5]}">${m[4]}</span></div><div class="msr-d">${m[2]}</div><div class="msr-src">${m[3]}</div></div>`).join("")}</div></div>
  <div class="card" style="margin-top:18px"><h3>How the label is decided</h3><div class="pad" style="font-size:12.5px;color:#3c2944;line-height:1.65">
   <b>A named analyst sets the label.</b> It is stored on the signal and is not computed from a formula. The five measures above are displayed as evidence alongside it.
   <div class="drv" style="margin-top:9px"><b>Weak signal</b> \u00b7 first reports only, thin or unconfirmed corroboration.</div>
   <div class="drv"><b>Building</b> \u00b7 independent sources agree, but it is not settled.</div>
   <div class="drv"><b>Established</b> \u00b7 proven, well corroborated, ready to inform standards work.</div>
   <div style="margin-top:10px">There is no composite score and no forecast. A composite number cannot be traced back to a source, so the tool does not produce one.</div>
   <div style="margin-top:8px"><b>One rule constrains the analyst.</b> A signal already within a published standard cannot be labelled below Established. The tool verifies this on every load.</div>
   <span style="color:var(--muted);display:block;margin-top:8px">In the live build, agents propose a label and an analyst confirms, edits or rejects it. Every override is logged with its reason.</span>
  </div></div>
  <div class="card" style="margin-top:18px"><h3>How proven is it \u00b7 the TRL, and what we do when TRL does not apply</h3><div class="pad" style="font-size:12.5px;color:#3c2944;line-height:1.65">
   <b>What places a signal on a rung.</b> Each rung is pinned to the artefact that evidences it, so two analysts reading the same evidence assign the same rung, and a technical committee can verify it.
   <div class="trlmap">
    <div class="trlmap-r"><span class="trlmap-n">3 \u2013 4</span><span>A published paper, or a validated lab result.</span></div>
    <div class="trlmap-r"><span class="trlmap-n">5 \u2013 6</span><span>Tested in conditions close to real use, or a working prototype in a relevant setting.</span></div>
    <div class="trlmap-r"><span class="trlmap-n">7</span><span>A pilot in operation, or a clause written into a real tender.</span></div>
    <div class="trlmap-r"><span class="trlmap-n">8</span><span>A complete system, finished and qualified through testing.</span></div>
    <div class="trlmap-r"><span class="trlmap-n">9</span><span>A published standard, or everyday commercial use.</span></div>
   </div>
   <div style="margin-top:10px"><b>Where the threshold sits.</b> Maturity sufficient to support an Established label begins at <b>TRL 7</b>, the first rung at which the technology is in operation. TRL 6 is a prototype. TRL 7 is a deployment.</div>
   <div style="margin-top:10px"><b>TRL applies to technology signals only.</b> ${SIGNALS.filter(x=>x.q==="tech").length} of the ${SIGNALS.length} signals carry one. A trade rule has no technology readiness level, and giving one to a regulation would be a category error. Market, regulatory and geopolitical signals are judged on the maturity stage below instead, and every signal shows which of the two it was judged on.</div>
   <div class="stagerub">${STAGE_RUBRIC.map(r=>`<div class="stagerub-r"><span class="stagerub-n">${r[1]}</span><span class="stagerub-d">${r[2]}<span class="stagerub-e">Evidence: ${r[3]}</span></span></div>`).join("")}</div>
  </div></div>
  <div class="card" style="margin-top:18px"><h3>Three labels</h3><div class="pad" style="font-size:12.8px;color:#3c2944;line-height:1.7"><b>Weak signal</b> · new and moving, but still thin on independent corroboration and low on maturity. Still early-stage. Action: keep on the watch list, not yet in a brief.<br><b>Building</b> · gathering corroboration and maturity, not yet settled. Action: track and prepare.<br><b>Established</b> · well corroborated, mature, and sources agree. Action: ready to inform standards decisions.<br><span style="color:var(--muted)">A named analyst sets the label and any change is logged. The maturity question uses the TRL band · see the Maturity / TRL view for the full 1 to 9 ladder.</span></div></div>
  <div class="cols2" style="margin-top:18px">${ex('WEAK','var(--geo)',sigById('aig').t,['Newly surfaced','Accelerating','Few independent sources','Low TRL'],'New and moving, but thin evidence → flagged weak, routed to a human to watch, not yet to a brief.')}
  ${ex('ESTABLISHED','#1f8a5a',sigById('wbg').t,['Tracked already','Many agreeing sources','High TRL','Broad reach'],'Well corroborated and mature → flagged established, ready to inform standards decisions.')}</div>
  <div class="card" style="margin-top:18px"><h3>Supporting steps · input → method → output</h3><div class="pad">${MECHS.map(m=>`<div class="mech"><b>${m[0]}</b><div>${m[1]}</div></div>`).join("")}</div></div>
  ${rn('<b>Why no score:</b> a single number would imply a precision the evidence does not support. A short set of questions and three clear labels are easier for the committee to review and challenge.')}`}
 else if(t==="human"){body=`${TIERS.map(ti=>`<div class="tier"><div class="lvl" style="background:${ti[2]}">${ti[0]} · ${ti[1]}</div><div class="det"><b>${ti[3]}</b> · watches ${ti[4]}<br>Authority: ${ti[5]}</div></div>`).join("")}
  <div class="card" style="margin-top:18px"><h3>RACI · who is accountable</h3><table class="raci"><tr><th style="text-align:left">Step</th>${RACI_ROLES.map(r=>`<th>${r}</th>`).join("")}</tr>${RACI.map(row=>`<tr><td style="text-align:left">${row[0]}</td>${RACI_ROLES.map(r=>`<td class="rc-${row[1][r]||''}">${row[1][r]||''}</td>`).join("")}</tr>`).join("")}</table><div class="srcnote" style="padding:0 14px 12px">R responsible · A accountable · C consulted · I informed</div></div>
  ${rn('<b>Override rate is monitored both ways:</b> a high rate indicates weak automated proposals; a very low rate can indicate over-reliance on the system (automation bias). Certifications and data residency are marked “to confirm”.')}`}
 else if(t==="controls"){body=`<div class="card"><h3>Controls<span class="c">${CONTROLS.length}</span></h3><div class="pad">${CONTROLS.map(c=>`<div class="drv"><b style="color:var(--purple)">${c[0]}</b> · ${c[1]} <span style="color:var(--muted)">${c[2]||''}</span></div>`).join("")}</div></div>
  <div class="card" style="margin-top:18px"><h3>Risk register<span class="c">${RISKS.length}</span></h3><table class="raci"><tr><th style="text-align:left">Risk</th><th style="text-align:left">What could happen</th><th style="text-align:left">Mitigation</th></tr>${RISKS.map(r=>`<tr><td style="text-align:left;font-weight:600;color:var(--purple)">${r[0]}</td><td style="text-align:left">${r[1]}</td><td style="text-align:left">${r[2]}</td></tr>`).join("")}</table></div>
  <div class="card" style="margin-top:18px"><h3>To confirm · open Board items<span class="c">2</span></h3><div class="pad">
   <div class="drv"><b style="color:var(--purple)">Data residency, security & certifications</b> · ISO 27001, GDPR and FADP alignment, where signal data sits and where the model calls run, and the audit trail. This choice decides which models can be used and where, so it drives both cost and architecture. <span style="color:var(--muted)">To confirm with the Board.</span></div>
   <div class="drv"><b style="color:var(--purple)">IEC internal-data ingestion</b> · reading IEC committee documents as a private Level-A source, subject to access and licensing. <span style="color:var(--muted)">To confirm with the Board.</span></div>
  </div></div>`}
 else if(t==="kpi"){body=`<div class="kpis">${KPIS.map(k=>`<div class="kpi"><div class="v" style="font-size:15px;line-height:1.3">${k[2]}</div><div class="k">${k[0]}</div><div class="d">${k[1]}</div></div>`).join("")}</div>
  <div class="card" style="margin-top:4px"><h3>Run economics · cost per signal, when live</h3><div class="pad"><div class="econ">
   <div class="econrow"><div class="en">Firehose</div><div class="eb"><b>Cheap embeddings filter first.</b> Every raw item from the tiered source universe is screened with a low-cost embedding to decide if it is even a candidate. This is where most volume is dropped, so the expensive step never sees it.</div></div>
   <div class="econrow"><div class="en">Survivors</div><div class="eb"><b>The language model runs only on candidates.</b> Extraction, clustering, cross-check and drafting use the costly model, priced at tokens per signal times the number that survive the filter. Model tier is the largest lever, roughly a 10x swing.</div></div>
   <div class="econrow"><div class="en">Fixed</div><div class="eb"><b>Monitoring and retraining.</b> A steady monthly cost for pipeline health, drift checks and the override log, independent of volume.</div></div>
   <div class="econrow"><div class="en">Per signal</div><div class="eb"><b>= embedding screen × firehose + model cost × survivors + fixed ÷ volume.</b> A number you can build on a napkin and defend, rather than assert.</div></div>
  </div><div class="srcnote">Indicative model for the funded build. Filtering the firehose with cheap embeddings before the costly model is the single biggest cost lever. Actual figures to confirm against live source volume.</div></div></div>
  <div class="grid2 even"><div class="card"><h3>Source coverage</h3><div class="pad">${hbars(SRCCOV)}</div></div>
  <div class="card"><h3>Glossary <span class="c">${Object.keys(TERMS).length}</span></h3><div class="glossary pad"><div class="srcnote" style="padding:0 0 8px">One glossary, one source. Every term below is the same definition you get by hovering it anywhere in the tool.</div>${Object.keys(TERMS).sort((a,b)=>a.localeCompare(b)).map(k=>`<div style="padding:6px 0;border-bottom:1px solid var(--mist);font-size:12.5px"><b style="color:var(--purple)">${k}</b> \u00b7 ${TERMS[k]}</div>`).join("")}</div></div></div>`}

V.audit=()=>{
 const allItems=REQS.flatMap(g=>g.items);
 const cnt={built:0,shown:0,conf:0,proposal:0};allItems.forEach(it=>{cnt[it[3]]=(cnt[it[3]]||0)+1});
 const meta={built:["Built in prototype","st-built"],shown:["Design-ready","st-shown"],conf:["To confirm","st-conf"],proposal:["In RFI / proposal","st-proposal"]};
 const f=state.auditFilter||"all";
 const filt=g=>g.items.filter(it=>f==="all"||it[3]===f);
 const rows=REQS.filter(g=>filt(g).length).map(g=>`<div class="card" style="margin-bottom:14px"><h3>${g.area}</h3><div>${filt(g).map(it=>`<div class="srow" style="cursor:default"><div class="l1"><span class="status ${meta[it[3]][1]}" style="font-family:var(--fm);font-size:8.5px;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:999px">${STLABEL[it[3]]}</span><span class="ti">${it[0]}</span>${it[2]?`<button class="chip" data-action="auditgo" data-view="${it[2]}" style="margin-left:auto">Open →</button>`:''}</div><div class="l2"><span>${it[1]}</span></div></div>`).join("")}</div></div>`).join("");
 const filters=[["all","All · "+allItems.length],["built","Built · "+cnt.built],["shown","Design-ready · "+cnt.shown],["conf","To confirm · "+cnt.conf],["proposal","Proposal · "+cnt.proposal]];
 return `<div class="crumb">Bid / Requirements Audit</div>
 <div class="phead"><h1>Requirements Audit</h1><div class="sub">${cnt.built} of ${allItems.length} requirements built in the prototype; ${cnt.shown} design-ready, ${cnt.conf} to confirm with the Board, ${cnt.proposal} in the commercial proposal.</div></div>
 <div class="auditsum">${Object.keys(meta).map(k=>`<div class="kpi"><div class="v">${cnt[k]||0}</div><div class="k">${meta[k][0]}</div></div>`).join("")}</div>
 <div class="bar-controls" style="margin:16px 0 4px">${filters.map(x=>`<button class="chip ${f===x[0]?'on':''}" data-action="auditfilter" data-f="${x[0]}">${x[1]}</button>`).join("")}</div>
 ${rows}
 ${rn('<b>Pricing sits outside this build by design</b> · it is a matter for the RFI response and commercial proposal, not the working demo. Certifications, references and data residency are flagged “to confirm”. Everything else is either built here or design-ready.')}`};

 const cb={weak:'sc-weak',emerging:'sc-emerging',strong:'sc-strong'}[s.cls];
 const subHTML=`<div class="whygrid">${[["New?",s.new?"Newly surfaced":"Tracked already"],["Moving?",({hot:"Accelerating",watch:"Building",stable:"Steady"})[s.mom]],["Corroboration",s.src+" independent sources"],["Maturity",s.trl?("TRL "+s.trl):s.ring],["Reach",impDots(s.imp)+" impact"]].map(r=>`<div class=\"whyrow\"><span>${r[0]}</span><b>${r[1]}</b></div>`).join("")}</div>`;
 const cmts=COMMENTS[id]||[];const assignee=ASSIGN[id];const sec=SECTOR_BY[s.sector];
 el("#drawer").innerHTML=`<div class="dh"><button class="close" data-action="closeDrawer">✕</button><span class="qtag ${s.q}">${Q[s.q]}</span> <span class="sclass ${cb}">${CLSLABEL[s.cls]}</span> ${s.new?'<span class="new">NEW</span>':''}<h2>${s.t}</h2><div style="font-size:13px;color:var(--muted)">${s.sum}</div><div style="margin-top:8px;font-family:var(--fm);font-size:10px;color:var(--purple)">${sec.name} · ${s.lang.join(' / ')}</div></div>
 <div class="dbody">
  <div class="metarow"><div class="meta"><span>Confidence</span><b>${s.conf}%</b></div><div class="meta"><span>Impact</span><b class="imp">${impDots(s.imp)}</b></div>${s.trl?`<div class="meta"><span>Maturity</span><b>TRL ${s.trl}</b></div>`:`<div class="meta"><span>Maturity</span><b style="font-size:13px">${s.ring}</b></div>`}<div class="meta"><span>Horizon</span><b style="font-size:13px">${s.horizon}</b></div><div class="meta"><span>Sources</span><b>${s.src}</b></div><div class="meta"><span>Status</span><b style="font-size:13px">${s.val?'Validated':'In review'}</b></div></div>
  <div class="dsec"><div class="lbl">Why this was classified <span style="font-family:var(--fm);font-size:9px;color:var(--muted);text-transform:none;letter-spacing:0;margin-left:auto">→ Classification method</span></div>${subHTML}<div class="srcnote">Label <b>${CLSLABEL[s.cls]}</b> reflects the pattern above, not a score. An analyst can override; overrides are logged.</div></div>

function openHowWorks(){

  ["Sources","Where the evidence comes from.","Three tiers. A Tier C item never stands alone; it needs Tier A or B before an analyst can validate it.","howitworks"],
  ["Method","How a signal earns its label.","Five plain questions, one label, set by a named analyst. No score, no forecast.","howitworks"],
  ["Governance","Who decides, and who is accountable.","Agents watch and draft. An analyst validates. The Board decides. Nothing publishes without a named sign-off.","howitworks"],
  ["Learning","How it gets better.","Continuous, and it only starts once the first four are agreed with the Board.","howitworks"]
 ];
 const cards=F.map((f,k)=>`<button class="hwr-card" data-action="hwgo" data-view="${f[3]}"><span class="hwr-n">${k+1}</span><span class="hwr-tx"><span class="hwr-h">${f[0]}</span><span class="hwr-s">${f[1]}</span><span class="hwr-d">${f[2]}</span></span><span class="hwr-go">\u2192</span></button>`).join("");
 const flow=HWSTAGES.map(st=>`<div class="hwr-stg ${st[0]==="human"?"human":""}"><div class="hwr-ico"><svg viewBox="0 0 24 24">${st[1]}</svg></div><div class="hwr-sn">${st[2]}</div><div class="hwr-sd">${st[3]}</div><span class="hwr-who ${st[0]}">${st[4]}</span></div>`).join("");
 const ov=el("#howOverlay");
 ov.innerHTML=`<div class="hw-card"><button class="hw-close" data-action="closeHow" title="Close">\u2715</button>
  <div class="hwr-eyebrow">Start here</div>
  <h2 class="hwr-title">How Foresight works</h2>
  <p class="hwr-lede">Five foundations. The first four are set once, with the Board, and only the Board can set them. The fifth runs continuously. Each one below opens the screen that owns it, and that screen is the only place it is explained.</p>

 </div>`;
 ov.classList.add("show");
}

function graphHighlight(id){const svg=el("#graphsvg");if(!svg)return;
 const edges=[...svg.querySelectorAll(".gedge")],nodes=[...svg.querySelectorAll(".gn")];
 if(!id){edges.forEach(x=>x.classList.remove("faded","hl"));nodes.forEach(x=>x.classList.remove("faded"));return}
 const adj=new Set([id]);edges.forEach(ed=>{if(ed.dataset.a===id)adj.add(ed.dataset.b);if(ed.dataset.b===id)adj.add(ed.dataset.a)});
 edges.forEach(ed=>{const on=ed.dataset.a===id||ed.dataset.b===id;ed.classList.toggle("hl",on);ed.classList.toggle("faded",!on)});
 nodes.forEach(n=>{n.classList.toggle("faded",!adj.has(n.dataset.id))})}

/* ================= INIT ================= */
/* masthead stays fixed and stable (scroll-collapse removed) */
let mastLast=0;
/* ---- hover-glossary: wrap first appearance of each term with a definition ---- */
function glossaryDecorate(root){
 const terms=Object.keys(TERMS).sort((a,b)=>b.length-a.length);
 const firstDone=new Set([...root.querySelectorAll('.gl.first')].map(n=>n.dataset.term));
 const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){
  if(!n.nodeValue.trim())return NodeFilter.FILTER_REJECT;
  let p=n.parentNode;while(p&&p!==root){const t=p.nodeName.toLowerCase();
   if(t==='script'||t==='style'||t==='svg'||t==='text')return NodeFilter.FILTER_REJECT;
   if(p.classList&&(p.classList.contains('gl')||p.classList.contains('glossary')))return NodeFilter.FILTER_REJECT;
   p=p.parentNode}return NodeFilter.FILTER_ACCEPT}});
 const nodes=[];let nn;while(nn=walker.nextNode())nodes.push(nn);
 for(const term of terms){const esc=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const re=new RegExp('(^|[^\\w-])('+esc+')(?![\\w-])');
  for(let k=0;k<nodes.length;k++){const node=nodes[k];if(!node.parentNode)continue;
   const m=node.nodeValue.match(re);if(!m)continue;
   const idx=m.index+m[1].length;const before=node.nodeValue.slice(0,idx);const after=node.nodeValue.slice(idx+term.length);
   const isFirst=!firstDone.has(term);firstDone.add(term);
   const span=document.createElement('span');span.className='gl'+(isFirst?' first':'');if(isFirst)span.setAttribute('tabindex','0');span.dataset.term=term;span.textContent=term;
   const frag=document.createDocumentFragment();const bn=document.createTextNode(before);const an=document.createTextNode(after);frag.appendChild(bn);frag.appendChild(span);frag.appendChild(an);
   node.parentNode.replaceChild(frag,node);nodes.splice(k,1,bn,an)}}
}
/* single floating tooltip · never clipped by cards or scroll containers */
const glTip=document.createElement('div');glTip.id='gltip';document.body.appendChild(glTip);
function glShow(elm){const term=elm.dataset.term;if(!TERMS[term])return;glTip.innerHTML='';const b=document.createElement('b');b.textContent=term;glTip.appendChild(b);glTip.appendChild(document.createTextNode(TERMS[term]));
 glTip.classList.add('show');const r=elm.getBoundingClientRect();glTip.style.visibility='hidden';glTip.style.left='0';glTip.style.top='0';
 requestAnimationFrame(()=>{const tw=glTip.offsetWidth,th=glTip.offsetHeight;let x=r.left,y=r.top-th-8;if(x+tw>innerWidth-8)x=innerWidth-8-tw;if(x<8)x=8;if(y<8)y=r.bottom+8;glTip.style.left=x+'px';glTip.style.top=y+'px';glTip.style.visibility='visible'});}
function glHide(){glTip.classList.remove('show');}
document.addEventListener('mouseover',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g)glShow(g);});
document.addEventListener('mouseout',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g)glHide();});
document.addEventListener('focusin',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g)glShow(g);});
document.addEventListener('focusout',glHide);document.addEventListener('click',e=>{const g=e.target.closest&&e.target.closest('.gl');if(g){glShow(g)}else{glHide()}});
document.addEventListener('scroll',glHide,true);
/* P3-9. A browser will not grant fullscreen on load: requestFullscreen() only runs inside a
   user gesture. So it fires on the first click. Once per load, so pressing Escape to leave is
   respected rather than fought. iOS Safari has no fullscreen for non-video elements, so this
   silently does nothing there, by design. */
let fsTried=false;
function fsSupported(){const d=document.documentElement;return !!(d.requestFullscreen||d.webkitRequestFullscreen)}
function fsIn(){const d=document.documentElement;const r=d.requestFullscreen||d.webkitRequestFullscreen;if(r)try{const q=r.call(d);if(q&&q.catch)q.catch(()=>{})}catch(e){}}
function fsOut(){const x=document.exitFullscreen||document.webkitExitFullscreen;if(x)try{const q=x.call(document);if(q&&q.catch)q.catch(()=>{})}catch(e){}}
function fsOn(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}
function fsToggle(){fsTried=true;fsOn()?fsOut():fsIn();setTimeout(fsBtnSync,120)}
function fsBtnSync(){}
document.addEventListener("click",()=>{if(fsTried||!fsSupported())return;fsTried=true;if(!fsOn())fsIn()},{once:true});
document.addEventListener("fullscreenchange",fsBtnSync);
/* Ctrl+Shift+F. A keydown is a valid user gesture, so this works. Ctrl+Shift+R cannot: the browser
   intercepts it as a reload, the page is destroyed, and the new load carries no gesture. */
document.addEventListener("keydown",e=>{if(e.ctrlKey&&e.shiftKey&&(e.key==="F"||e.key==="f")){e.preventDefault();fsToggle()}});
document.addEventListener('change',e=>{const t=e.target;if(t&&t.dataset&&t.dataset.action==='graphsig'){state.graphSig=t.value;el('#main').innerHTML=V.graph();kgRender()}});
let glObserver=null;
function startGlossary(){const root=el("#main");
 /* P3-1. The observer used to re-walk every text node against every term on ANY mutation inside
    #main. The Signal Landscape rewrites its tooltip on mousemove, so hovering the network ran a
    full glossary pass per frame. Mutations inside the landscape stage are now ignored, and the
    rest are debounced to one pass per frame. */
 let pending=null;
 const run=()=>{if(glObserver)glObserver.disconnect();try{glossaryDecorate(root)}catch(e){}if(glObserver)glObserver.observe(root,{childList:true,subtree:true})};
 const inStage=n=>{let p=n;while(p&&p!==root){if(p.id==="lsStage"||p.id==="lsTip"||p.id==="lsLabels")return true;p=p.parentNode}return false};
 glObserver=new MutationObserver(muts=>{
  if(muts.every(m=>inStage(m.target)))return;
  if(pending)cancelAnimationFrame(pending);
  pending=requestAnimationFrame(()=>{pending=null;run()});
 });
 run();}

buildNav();renderPresence();updBadges();setView("overview");startGlossary();selfCheck();fsBtnSync();
