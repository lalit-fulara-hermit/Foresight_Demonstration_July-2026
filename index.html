:root{
  --purple:#43224d;--purple-700:#5a2e66;--magenta:#e0044e;--ink:#2a1730;--muted:#6b5a73;
  --paper:#faf8fc;--panel:#fff;--mist:#f5f1f8;--line:#ece4f1;--bar:#6f5179;
  --hot:#e0443a;--watch:#e0902f;--stable:#2e9e63;
  --tech:#8a3fb0;--mkt:#c0700d;--reg:#1f8a82;--geo:#c01b50;
  --fd:'Plex Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --fm:'Plex Mono',ui-monospace,"SF Mono",Consolas,monospace;
  --brand:'Plex Serif',Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--fd);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,textarea,select{font:inherit}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#d9cce0;border-radius:6px}
a{color:inherit}
.app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:56px 1fr;height:100vh;grid-template-areas:"brand top" "side main"}
.brand,.top{transition:opacity .18s}

/* top bar */
.brand{grid-area:brand;background:var(--purple);color:#fff;display:flex;align-items:center;gap:8px;padding:0 16px;font-family:var(--brand);font-weight:600;font-size:16.5px;letter-spacing:0;overflow:hidden}
.brand .b{color:var(--magenta)}
.brand small{font-family:var(--fm);font-weight:400;font-size:9px;letter-spacing:.1em;color:#cdb4d8;display:block;margin-top:-2px}
.top{grid-area:top;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 16px;position:relative;z-index:65;overflow:hidden}
.search{flex:1;max-width:460px;display:flex;align-items:center;gap:8px;background:var(--mist);border:1px solid var(--line);border-radius:9px;padding:7px 11px;position:relative}
.search svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.8;flex:none}
.search input{border:0;background:none;outline:none;width:100%;color:var(--ink)}
.search kbd{font-family:var(--fm);font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 5px;background:#fff}
.top .sp{flex:1}
.presence{display:flex;align-items:center}
.presence .av{width:28px;height:28px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;border:2px solid #fff;margin-left:-7px;position:relative}
.presence .av:first-child{margin-left:0}
.presence .doton{position:absolute;right:-1px;bottom:-1px;width:8px;height:8px;border-radius:50%;background:#2f9b94;border:1.5px solid #fff}
.iconbtn{position:relative;width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.iconbtn:hover{background:var(--mist)}
.iconbtn svg{width:18px;height:18px;stroke:var(--purple);fill:none;stroke-width:1.7}
.badge{position:absolute;top:3px;right:3px;min-width:16px;height:16px;background:var(--magenta);color:#fff;border-radius:9px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:var(--fm)}
.who{display:flex;align-items:center;gap:9px;padding-left:8px;border-left:1px solid var(--line)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--magenta));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.who small{font-family:var(--fm);font-size:10px;color:var(--muted)}

/* dropdowns */
.dropwrap{position:fixed;top:52px;right:16px;width:330px;background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:0 24px 50px -24px rgba(28,15,36,.5);z-index:70;overflow:hidden;display:none}
.dropwrap.show{display:block}
.dropwrap h4{margin:0;padding:12px 14px;font-size:12px;border-bottom:1px solid var(--line);color:var(--purple);display:flex;align-items:center;gap:8px}
.dropwrap h4 a{margin-left:auto;font-size:11px;color:var(--magenta);text-decoration:none;cursor:pointer}
.al{display:flex;gap:9px;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--mist);font-size:12.5px;cursor:pointer}
.al:last-child{border-bottom:0}.al:hover{background:#faf6fc}
.al .d{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}

/* sidebar */
.side{grid-area:side;background:#fbf9fc;border-right:1px solid var(--line);padding:12px 10px;overflow:auto;position:relative;z-index:60}
.side .grp{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#a392ad;margin:14px 10px 6px}
.side .grp:first-child{margin-top:4px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 10px;border-radius:9px;font-size:13.5px;color:#4a3753}
.nav button:hover{background:#f1e8f5}
.nav button.on{background:#efe4f4;color:var(--purple);font-weight:600}
.nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;flex:none}
.nav .ct{margin-left:auto;font-family:var(--fm);font-size:10px;color:#a392ad;background:#fff;border:1px solid var(--line);border-radius:8px;padding:1px 6px}

/* main */
.main{grid-area:main;overflow:auto;padding:22px 26px 70px;position:relative}
.phead{display:flex;align-items:flex-end;gap:14px;margin-bottom:4px}
.phead h1{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--purple);margin:0}
.phead .sub{color:var(--muted);font-size:13px;margin-bottom:2px}
.phead .right{margin-left:auto;display:flex;gap:8px}
.crumb{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--magenta);margin-bottom:6px}
.btn{background:var(--purple);color:#fff;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;display:inline-flex;gap:7px;align-items:center}
.btn:hover{background:var(--purple-700)}
.btn.ghost{background:#fff;color:var(--purple);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--mist)}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn.sm{padding:6px 10px;font-size:12px}

/* kpis / cards */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px;text-align:left}
.kpiclick{cursor:pointer;position:relative;transition:border-color .15s,box-shadow .15s,transform .15s}
.kpiclick:hover{border-color:var(--magenta);box-shadow:0 10px 24px -14px rgba(67,34,77,.4);transform:translateY(-2px)}
.kpi-go{position:absolute;top:11px;right:13px;color:#cdb6da;font-size:14px;line-height:1;transition:color .15s}
.kpiclick:hover .kpi-go{color:var(--magenta)}
.kpi:hover{border-color:#d6c2e2;box-shadow:0 8px 22px -16px rgba(67,34,77,.4)}
.kpi .v{font-size:27px;font-weight:800;color:var(--purple);letter-spacing:-.02em}
.kpi .k{font-family:var(--fm);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.kpi .d{font-size:11.5px;margin-top:5px}
.up{color:#1f9b6e}.hotx{color:var(--magenta)}.muted{color:var(--muted)}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.grid2.even{grid-template-columns:1fr 1fr}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.card h3{font-size:14px;color:var(--purple);margin:0;padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;font-weight:700}
.card h3 .c{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--muted);font-weight:400}
.card h3 a{margin-left:auto;font-size:11px;color:var(--magenta);text-decoration:none;font-weight:600;cursor:pointer}
.pad{padding:14px 15px}

/* signal rows */
.srow{padding:11px 14px;display:block;width:100%;text-align:left;border-bottom:1px solid var(--mist)}
.srow:last-child{border-bottom:0}.srow:hover{background:#faf6fc}
.srow .l1{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.qtag{font-family:var(--fm);font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;border:1px solid var(--line);flex:none}
.qtag.tech{color:var(--tech);border-color:#e3d2ef;background:#f8f1fb}
.qtag.reg{color:var(--reg);border-color:#cfeae7;background:#eefaf8}
.qtag.market{color:var(--mkt);border-color:#f3e2c8;background:#fdf6ea}
.qtag.geo{color:var(--geo);border-color:#f6d4df;background:#fdeef3}
.srow .ti{font-size:13.5px;font-weight:600;color:var(--ink)}
.srow .l2{display:flex;align-items:center;gap:14px;margin-top:6px;font-family:var(--fm);font-size:10.5px;color:var(--muted);flex-wrap:wrap}
.chk{color:#1f9b6e}
.bar{width:50px;height:5px;border-radius:3px;background:#eee2f1;display:inline-block;overflow:hidden;vertical-align:middle}
.bar i{display:block;height:100%;background:var(--bar)}
.imp{color:var(--magenta);letter-spacing:1px}
.new{font-family:var(--fm);font-size:9px;color:#fff;background:var(--magenta);border-radius:5px;padding:1px 5px;letter-spacing:.04em}
.sclass{font-family:var(--fm);font-size:8.5px;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:999px;flex:none}
.sc-weak{background:#fdeef3;color:var(--geo)}.sc-emerging{background:#fdf6ea;color:var(--mkt)}.sc-strong{background:#e7f7ef;color:#1f8a5a}
.lang{font-family:var(--fm);font-size:8.5px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 4px;background:#fff}

/* chips & controls */
.bar-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:16px 0}
.chip{font-family:var(--fm);font-size:11px;letter-spacing:.03em;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted)}
.chip:hover{border-color:#d6c2e2}
.chip.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.sel{font-family:var(--fm);font-size:11px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#fff;color:var(--ink)}
.spacer{flex:1}.count{font-family:var(--fm);font-size:11px;color:var(--muted)}

/* radar */
.radarwrap{display:grid;grid-template-columns:1.05fr 1fr;gap:18px;grid-template-rows:calc(min(72vh,600px) + 54px);align-items:stretch}
.radarcard{background:#fbfafc;border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
svg.radar{width:auto;height:min(72vh,600px);max-width:100%;display:block;margin:0 auto}
.rhead{display:flex;justify-content:space-between;font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#b79ac6;padding:4px 6px 8px}
.hwr-eyebrow{font-family:var(--fm);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--magenta);font-weight:600}
.hwr-title{margin:6px 0 6px;font-size:26px;color:var(--purple);font-weight:800;letter-spacing:-.01em}
.hwr-lede{margin:0 0 16px;color:#4c4c4d;font-size:13px;line-height:1.6;max-width:720px}
.hwr{display:grid;gap:8px;margin-bottom:20px}
.hwr-card{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:#fbfafc;border:1px solid var(--mist);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.hwr-card:hover{border-color:var(--purple);box-shadow:0 6px 18px -12px rgba(67,34,77,.45)}
.hwr-n{font-family:var(--fm);font-size:11px;color:#fff;background:var(--purple);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex:none;margin-top:2px}
.hwr-tx{display:block;flex:1}
.hwr-h{display:block;font-weight:700;color:var(--purple);font-size:14.5px}
.hwr-s{display:block;color:#1c1220;font-size:12.5px;margin-top:2px}
.hwr-d{display:block;color:#6b6572;font-size:11.5px;margin-top:3px;line-height:1.5}
.hwr-go{color:var(--magenta);font-size:15px;flex:none;margin-top:2px}
.hwr-sech{font-size:13.5px;color:var(--purple);font-weight:700;margin:0 0 10px}
.hwr-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.hwr-stg{text-align:center;background:#fbfafc;border:1px solid var(--mist);border-radius:10px;padding:14px 10px 12px}
.hwr-stg.human{background:#f7f1f9;border-color:#e3d6ea}
.hwr-ico{width:42px;height:42px;border-radius:50%;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;background:#f3eef8;border:1.5px solid #e3d6ea}
.hwr-ico svg{width:19px;height:19px;fill:none;stroke:var(--purple);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.hwr-stg.human .hwr-ico{background:#fdeef3;border-color:#f6d4df}
.hwr-stg.human .hwr-ico svg{stroke:var(--magenta)}
.hwr-sn{font-size:13.5px;font-weight:700;color:#1c1220}
.hwr-sd{font-size:11px;color:#6b6572;line-height:1.45;margin-top:4px;min-height:46px}
.hwr-who{display:inline-block;margin-top:6px;font-family:var(--fm);font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:999px;font-weight:600;background:#f0eaf3;color:#6b5a75}
.hwr-who.human{background:#fdeef3;color:var(--magenta)}
.hwr-who.out{background:#e9f6ef;color:#1f8a5a}
.hwr-note{font-size:12.5px;line-height:1.6;color:#4c4c4d;background:#fbfafc;border:1px solid var(--mist);border-radius:10px;padding:12px 14px}
.hwr-note b{color:var(--purple)}
.hwr-foot{text-align:center;border-top:1px solid var(--mist);padding-top:16px;margin-top:18px}
.brand{cursor:pointer}
.kpis{grid-template-columns:repeat(5,1fr)}
.kpi-due{border-color:#e0044e;background:#fffafb}
.kpi-due .v{color:#e0044e}
.dlrow{display:grid;grid-template-columns:104px 92px 1fr 104px;gap:12px;align-items:start;padding:10px 0;border-bottom:1px solid var(--mist);cursor:pointer;text-align:left;width:100%;background:none;border-left:0;border-right:0;border-top:0}
.dlrow:hover{background:#faf7fb}
.dl-d{font-family:var(--fm);font-size:11px;color:var(--purple);font-weight:600}
.dl-k{font-family:var(--fm);font-size:10px;color:var(--muted);background:#f4eef7;border:1px solid #e3d6ea;border-radius:5px;padding:2px 6px;text-align:center;height:fit-content}
.dl-k.hot{color:#e0044e;background:#fdeef3;border-color:#f6d4df}
.dl-w{font-size:12.5px;color:#2a1832}
.dl-b{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}
.dl-s{font-family:var(--fm);font-size:10px;color:var(--muted);text-align:right}
.vbadge{font-family:var(--fm);font-size:9px;color:#2f6f4f;background:#e9f5ee;border:1px solid #cfe6d9;border-radius:4px;padding:1px 5px}
.dbadge{font-family:var(--fm);font-size:9px;color:#e0044e;background:#fdeef3;border:1px solid #f6d4df;border-radius:4px;padding:1px 5px}
.setline{display:inline-block;margin-top:4px;color:#9b8fa6;font-size:11.5px}
.buildstamp{font-family:var(--fm);font-size:10px;color:#9b8fa6;letter-spacing:.02em}
.lenshead{display:grid;grid-template-columns:104px 2.1fr 1.1fr 108px 96px 96px;gap:10px;padding:6px 0 8px;border-bottom:1px solid var(--mist);font-family:var(--fm);font-size:10px;color:#9b8fa6;text-transform:uppercase;letter-spacing:.05em}
.lensrow{display:grid;grid-template-columns:104px 2.1fr 1.1fr 108px 96px 96px;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--mist);font-size:12.5px;cursor:pointer}
.lensrow:hover{background:#faf7fb}
.lens-t{color:#2a1832;font-weight:500}
.lens-m,.lens-s,.lens-h{color:var(--muted);font-size:11.5px}
.lens-b{font-family:var(--fm);font-size:10.5px;color:var(--purple);background:#f4eef7;border:1px solid #e3d6ea;border-radius:5px;padding:2px 6px;text-align:center}
.lens-cls{font-family:var(--fm);font-size:9.5px;border-radius:5px;padding:3px 6px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.cls-strong{color:#2f6f4f;background:#e9f5ee;border:1px solid #cfe6d9}
.cls-emerging{color:#7a5a12;background:#fdf3e0;border:1px solid #f0e0bd}
.cls-weak{color:#e0044e;background:#fdeef3;border:1px solid #f6d4df}
.trlmap{margin-top:10px;border-top:1px solid var(--mist)}
.trlmap-r{display:flex;gap:12px;padding:7px 0;border-bottom:1px solid var(--mist);align-items:baseline}
.trlmap-n{font-family:var(--fm);font-size:11px;color:#fff;background:var(--purple);border-radius:5px;padding:2px 8px;min-width:44px;text-align:center;flex:none}
.stagerub{margin-top:12px;border-top:1px solid var(--mist)}
.stagerub-r{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--mist)}
.stagerub-n{font-family:var(--fm);font-size:11px;color:var(--purple);background:#f4eef7;border:1px solid #e3d6ea;border-radius:5px;padding:3px 8px;min-width:104px;text-align:center;flex:none;height:fit-content}
.stagerub-d{display:block}
.stagerub-e{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}
.graph .gelab{font-family:var(--fm);font-size:8.5px;fill:#9b8fa6;letter-spacing:.02em}
.graph .gedge.dash{stroke-dasharray:3 3;opacity:.55}
.kgp{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--mist);font-size:12.5px}
.kgp-c{font-family:var(--fm);font-size:11px;color:var(--purple);background:#f4eef7;border:1px solid #e3d6ea;border-radius:5px;padding:2px 7px}
.kgp-x{color:#b3a7bb;font-size:11px}
.kgp-n{color:#6b6572;font-size:11.5px}
.kgp-f{margin-left:auto;font-family:var(--fm);font-size:10px;color:#e0044e;background:#fdeef3;border:1px solid #f6d4df;border-radius:5px;padding:2px 7px}
.radar .hzspan{stroke:#a297b4;stroke-width:2.4;stroke-linecap:round;opacity:.45}
.radar .dot{cursor:pointer;transition:r .12s}
.radar .dot:hover{stroke:#43224d;stroke-width:2}
.cgl{font-family:var(--fm);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);align-self:center;margin-right:1px}
.dl{font-family:var(--fm);font-size:8.2px;fill:#e8dcef;pointer-events:none}
.rl{font-family:var(--fm);font-size:12px;fill:#9b81a9;text-transform:uppercase;letter-spacing:.05em}
.ql{font-family:var(--fm);font-size:13px;fill:#43224d;text-transform:uppercase;letter-spacing:.09em;font-weight:600}
.sig{animation:pulse 2.6s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.rlist{max-height:min(58vh,494px);overflow:auto}
.leg{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--fm);font-size:10px;color:#6b6577;padding:8px 6px 4px}
.leg i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.fl{font-family:var(--fm);font-size:12px;fill:#6b6577;letter-spacing:.04em}
.rcard{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.rcard .rlist{flex:1;min-height:0;max-height:none}
.gl{cursor:help}
.gl.first{border-bottom:1px dotted var(--magenta)}
#gltip{position:fixed;z-index:9999;max-width:260px;background:#1c1024;color:#efe6f3;font-family:var(--fd);font-size:11.5px;font-weight:400;line-height:1.5;letter-spacing:0;padding:9px 11px;border-radius:9px;box-shadow:0 16px 34px -12px rgba(28,15,36,.55);opacity:0;visibility:hidden;transition:opacity .12s;pointer-events:none}
#gltip.show{opacity:1;visibility:visible}
#gltip b{color:#f59ac0;display:block;margin-bottom:2px;font-size:11px}

/* classification rubric / docs / TRL ladder */
.chips2{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chips2 span{font-family:var(--fm);font-size:10.5px;background:var(--mist);color:var(--purple);padding:3px 9px;border-radius:999px}
.whygrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;margin-top:6px}
.whyrow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:7px 0;border-bottom:1px solid var(--mist)}
.whyrow span{color:var(--muted)}.whyrow b{color:var(--ink);font-weight:600}
.doccallout{display:flex;gap:14px;align-items:center;margin-top:18px;padding:15px 18px;border:1px solid var(--line);border-left:3px solid var(--magenta);border-radius:13px;background:linear-gradient(120deg,#fbf7fd,#fdf1f6);text-decoration:none;color:inherit;transition:box-shadow .15s,border-color .15s}
.doccallout:hover{border-color:var(--magenta);box-shadow:0 10px 26px -14px rgba(67,34,77,.5)}
.dc-ic{flex-shrink:0;width:40px;height:40px;border-radius:10px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.dc-ic svg{width:22px;height:22px;fill:none;stroke:var(--purple);stroke-width:1.6}
.dc-tx{flex:1}.dc-k,.dc-t,.dc-d{display:block}
.dc-k{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.dc-t{font-size:14.5px;font-weight:700;color:var(--purple);margin:1px 0 2px}
.dc-d{font-size:11.8px;color:var(--muted);line-height:1.5}
.dc-go{font-family:var(--fm);font-size:11px;color:var(--magenta);white-space:nowrap;align-self:center}
.trlladder{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px}
.trung{display:flex;gap:11px;align-items:flex-start;padding:5px 0}
.trung .tn{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--purple);color:#fff;font-family:var(--fm);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.trung b{display:block;font-size:12.5px;color:var(--ink)}.trung span{font-size:11.5px;color:var(--muted)}
@media(max-width:760px){.trlladder,.whygrid{grid-template-columns:1fr}.doccallout{flex-wrap:wrap}.dc-go{width:100%}}
/* table */
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th,table.t td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:middle}
table.t th{font-family:var(--fm);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);background:var(--mist)}
table.t tr:hover td{background:#faf6fc}
.pillstat{font-family:var(--fm);font-size:10px;padding:3px 9px;border-radius:999px}
.s-active{background:#e7f7ef;color:#1f8a5a}.s-draft{background:#fdeef3;color:var(--geo)}.s-rev{background:#fdf6ea;color:var(--mkt)}.s-force{background:#efe4f4;color:var(--purple)}

/* maturity / bars */
.trl{padding:13px 15px}
.trl .item{padding:9px 0;border-bottom:1px solid var(--mist)}.trl .item:last-child{border-bottom:0}
.trl .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.trl .row span{font-family:var(--fm);font-size:10px;color:var(--muted)}
.trlbar{height:8px;border-radius:4px;background:#efe7f3;overflow:hidden}
.trlbar i{display:block;height:100%;background:var(--bar)}
.minibars{display:flex;align-items:flex-end;gap:10px;height:150px;padding:14px}
.minibars .b{flex:1;background:var(--bar);border-radius:6px 6px 0 0;position:relative;min-width:14px}
.minibars .b span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-family:var(--fm);font-size:9px;color:var(--muted)}
.minibars .b em{position:absolute;top:-18px;left:0;right:0;text-align:center;font-family:var(--fm);font-size:10px;color:var(--purple);font-style:normal;font-weight:700}
.chart{padding:14px}
.hbars{padding:14px 15px}
.hb{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12px}
.hb .lab{width:150px;color:var(--ink);flex:none}
.hb .track{flex:1;height:13px;background:#efe7f3;border-radius:7px;overflow:hidden}
.hb .track i{display:block;height:100%;background:var(--bar)}
.hb .val{font-family:var(--fm);font-size:11px;color:var(--muted);width:46px;text-align:right;flex:none}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* risk / exposure */
.risk{padding:6px 14px}
.risk .r{padding:11px 0;border-bottom:1px solid var(--mist)}.risk .r:last-child{border-bottom:0}
.risk .rt{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600}
.sev{font-family:var(--fm);font-size:10px;padding:2px 8px;border-radius:999px}
.sev.h{background:#fdeef3;color:var(--geo)}.sev.m{background:#fdf6ea;color:var(--mkt)}.sev.l{background:#eefaf8;color:var(--reg)}
.exbar{height:7px;border-radius:4px;background:#efe7f3;margin-top:8px;overflow:hidden}
.exbar i{display:block;height:100%;background:var(--bar)}

/* graph */
.kg{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
svg.graph{width:100%;height:auto;max-height:min(70vh,520px);display:block;margin:0 auto;background:linear-gradient(180deg,#fcfaff,#f7f2fb)}
.gn{cursor:pointer}.gn rect,.gn circle{transition:.18s}
.gn text{font-family:var(--fm);font-size:11px;fill:#3a2745;pointer-events:none}
.gedge{stroke:#d8c6e2;stroke-width:1.6;transition:.18s}
.faded{opacity:.18}.hl{stroke:var(--magenta)!important;stroke-width:2.4!important}

/* report builder */
.rb{display:grid;grid-template-columns:1fr 320px;gap:18px}
.cartitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--mist)}
.cartitem:last-child{border-bottom:0}
.cartitem .x{margin-left:auto;color:var(--muted);width:24px;height:24px;border-radius:6px}
.cartitem .x:hover{background:var(--mist);color:var(--geo)}
.empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(28,15,36,.34);opacity:0;pointer-events:none;transition:.18s;z-index:75}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:480px;max-width:96vw;background:#fff;border-left:1px solid var(--line);box-shadow:-30px 0 60px -30px rgba(28,15,36,.5);transform:translateX(102%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:76;display:flex;flex-direction:column}
.drawer.show{transform:none}
.dh{padding:16px 18px;border-bottom:1px solid var(--line)}
.dh .close{float:right;width:30px;height:30px;border-radius:8px;color:var(--muted)}
.dh .close:hover{background:var(--mist)}
.dh h2{font-size:18px;margin:8px 0 4px;color:var(--ink);line-height:1.25}
.dbody{flex:1;overflow:auto;padding:16px 18px}
.metarow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.meta{background:var(--mist);border-radius:9px;padding:8px 10px}
.meta span{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block}
.meta b{font-size:15px;color:var(--purple)}
.dsec{margin:14px 0}
.dsec .lbl{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px;display:flex;align-items:center}
.drv{font-size:12.5px;padding:6px 0 6px 16px;position:relative;color:#3c2944}
.drv:before{content:"";position:absolute;left:2px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--magenta)}
.spark{width:100%;height:46px}
.tcchip{display:inline-block;font-family:var(--fm);font-size:10px;color:var(--purple);background:#efe4f4;border:1px solid #dcc8e6;border-radius:7px;padding:3px 8px;margin:0 5px 5px 0;cursor:pointer}
.tcchip:hover{background:#e6d3ee}
.dactions{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}

/* sub-scores */
.subg{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.subm .sl{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px}
.subm .sl b{color:var(--purple);font-family:var(--fm);font-size:11px}
.subt{height:7px;border-radius:4px;background:#efe7f3;overflow:hidden}
.subt i{display:block;height:100%}
.subt.n i,.subt.v i,.subt.c i,.subt.m i,.subt.f i{background:var(--bar)}

/* sources */
.srcrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--mist);text-decoration:none;color:inherit}
.srcrow:last-of-type{border-bottom:0}
.srcrow:hover .srct{color:var(--magenta)}
.srcty{font-family:var(--fm);font-size:8.5px;letter-spacing:.03em;text-transform:uppercase;padding:3px 7px;border-radius:6px;flex:none;white-space:nowrap}
.srcmain{flex:1;min-width:0}.srct{display:block;font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.3}
.srcm{display:block;font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px}
.srcrow .ext{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8;flex:none}
.srcnote{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.5}
.srcline{margin-top:9px;font-size:11.5px;color:var(--muted);line-height:1.6}
.srcline a{color:var(--purple);text-decoration:none;border-bottom:1px solid var(--line)}
.srcline a:hover{border-color:var(--magenta);color:var(--magenta)}
.ty-journal{background:#f8f1fb;color:#8a3fb0}.ty-patent{background:#eefaf8;color:#1f8a82}
.ty-standard{background:#efe4f4;color:#43224d}.ty-policy{background:#fdeef3;color:#c01b50}
.ty-market{background:#fdf6ea;color:#c0700d}.ty-news{background:#eef2fb;color:#3a5bd0}
.ty-conference{background:#f1f7ee;color:#4a8a2f}.ty-trade{background:#fdeef3;color:#c01b50}
.runnote{display:flex;gap:10px;align-items:flex-start;background:#f3eef6;border:1px solid var(--line);border-left:3px solid var(--magenta);border-radius:0 10px 10px 0;padding:11px 14px;margin:14px 0;font-size:12.6px;color:#4a3753}
.runnote svg{width:16px;height:16px;flex:none;stroke:var(--magenta);fill:none;stroke-width:1.8;margin-top:2px}
.runnote a{color:var(--magenta);font-weight:600;cursor:pointer;white-space:nowrap;margin-left:auto;text-decoration:none}
.presence .av.off .doton{background:#c2b3cb}
.gnshape{cursor:pointer}

/* comments / collaboration */
.cmt{display:flex;gap:9px;padding:10px 0;border-bottom:1px solid var(--mist)}
.cmt:last-child{border-bottom:0}
.cmt .av{width:26px;height:26px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:none}
.cmt .cb{flex:1;min-width:0}
.cmt .cn{font-size:12.5px;font-weight:700;color:var(--ink)}
.cmt .ct{font-family:var(--fm);font-size:9.5px;color:var(--muted);margin-left:6px;font-weight:400}
.cmt .cx{font-size:12.5px;color:#3c2944;margin-top:2px}
.cmtbox{display:flex;gap:8px;margin-top:10px}
.cmtbox input{flex:1;border:1px solid var(--line);border-radius:9px;padding:8px 11px;outline:none;background:var(--mist)}
.cmtbox input:focus{background:#fff;border-color:#d6c2e2}
.assignbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
.miniav{width:24px;height:24px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700}
.pickav{width:26px;height:26px;border-radius:50%;border:1px dashed #c8b4d4;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.pickav:hover{border-color:var(--magenta);color:var(--magenta)}
.wkcol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.task{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-bottom:1px solid var(--mist)}
.task:last-child{border-bottom:0}.task:hover{background:#faf6fc}
.task .tx{flex:1}.task .tmeta{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:3px}
.rvw{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--mist);font-size:12.5px}
.rvw:last-child{border-bottom:0}
.rvstat{font-family:var(--fm);font-size:9px;padding:3px 8px;border-radius:999px;margin-left:auto}
.rv-pending{background:#fdf6ea;color:var(--mkt)}.rv-approved{background:#e7f7ef;color:#1f8a5a}.rv-changes{background:#fdeef3;color:var(--geo)}

/* sectors */
.sectors{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sct{border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden;cursor:pointer;transition:.15s}
.sct:hover{border-color:#d6c2e2;box-shadow:0 10px 24px -18px rgba(67,34,77,.5)}
.sct .top{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.sct .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none}
.sct .ic svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:1.9}
.sct h4{margin:0;font-size:13.5px;color:var(--purple);font-weight:700}
.sct .tcs{font-family:var(--fm);font-size:9.5px;color:var(--muted);margin-top:1px}
.sct .bd{padding:11px 14px;font-size:12px;color:#3c2944}
.sct .cov{display:flex;align-items:center;gap:8px;margin-top:10px}
.sct .cov .track{flex:1;height:7px;border-radius:4px;background:#efe7f3;overflow:hidden}
.sct .cov .track i{display:block;height:100%;background:var(--bar)}
.sct .cov .n{font-family:var(--fm);font-size:10px;color:var(--muted)}
.caband{background:linear-gradient(120deg,#efe4f4,#fdeef3);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-top:16px}
.caband b{color:var(--purple)}

/* operating model */
.subtabs{display:flex;gap:4px;flex-wrap:wrap;margin:14px 0 18px;border-bottom:1px solid var(--line)}
.subtab{padding:9px 14px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;font-weight:600;border-radius:8px 8px 0 0}
.subtab:hover{color:var(--purple);background:#f7f2fb}
.subtab.on{color:var(--purple);border-bottom-color:var(--magenta)}
.actors{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.actor{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff}
.actor .at{padding:12px 14px;color:#fff;font-weight:700;font-size:14px}
.actor .at small{display:block;font-family:var(--fm);font-weight:400;font-size:9px;letter-spacing:.06em;opacity:.85;margin-top:1px}
.actor .ab{padding:13px 14px;font-size:12.6px;color:#3c2944}
.actor .ab .lbl{font-family:var(--fm);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:9px 0 4px}
.actor ul{margin:2px 0 0;padding-left:15px}.actor li{margin:3px 0}
.flow6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:14px 0}
.fstep{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 11px}
.fstep .n{font-family:var(--fm);font-size:10px;color:var(--magenta);font-weight:700}
.fstep h5{margin:3px 0 5px;font-size:13px;color:var(--purple)}
.fstep p{margin:0;font-size:11px;color:var(--muted);line-height:1.4}
.fstep .who{margin-top:8px;font-family:var(--fm);font-size:8.5px;letter-spacing:.03em;text-transform:uppercase;color:#8a3fb0}
.tier{display:grid;grid-template-columns:130px 1fr;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:10px}
.tier .lvl{padding:13px;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;line-height:1.3}
.tier .det{padding:11px 14px;font-size:12.6px;background:#fff;line-height:1.55}.tier .det b{color:var(--purple)}
.raci{width:100%;border-collapse:collapse;font-size:12px;margin-top:2px}
.raci th,.raci td{border:1px solid var(--line);padding:8px 6px;text-align:center}
.raci th{background:var(--mist);font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.raci td.act{text-align:left;font-size:12.5px}
.rc{display:inline-block;width:22px;height:22px;line-height:22px;border-radius:6px;font-family:var(--fm);font-size:11px;font-weight:700;color:#fff}
.rc-R{background:#2f9b94}.rc-A{background:#43224d}.rc-C{background:#e2982f}.rc-I{background:#b79ac6}
.glossary dt{font-weight:700;color:var(--purple);font-size:13px;margin-top:10px}
.glossary dd{margin:2px 0 0;font-size:12.6px;color:#4a3753}
.defcard{padding:14px 15px;font-size:13px;color:#3c2944;line-height:1.7}.defcard b{color:var(--purple)}
.mono-note{font-family:var(--fm);font-size:11px;color:var(--muted);padding:0 2px;margin-top:6px}

/* method */
.feat{display:grid;grid-template-columns:150px 1fr 215px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--mist)}
.feat:last-child{border-bottom:0}
.feat .fn{font-weight:700;color:var(--purple);font-size:12.5px}
.feat .fd{font-size:12px;color:#3c2944}
.feat .fw{font-family:var(--fm);font-size:10.5px;color:var(--muted);text-align:right;line-height:1.45}
@media(max-width:760px){.feat{grid-template-columns:1fr}.feat .fw{text-align:left}}
.mech{display:grid;grid-template-columns:150px 1fr;gap:6px 14px;padding:9px 0;border-bottom:1px solid var(--mist);font-size:12.5px}
.mech:last-child{border-bottom:0}.mech b{color:var(--purple)}
.worked{background:var(--mist);border:1px solid var(--line);border-radius:12px;padding:14px 16px}

/* audit */
.auditsum{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:16px 0 8px}
.stat{border:1px solid var(--line);border-radius:12px;padding:15px;text-align:center;background:#fff}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-.02em}
.stat .k{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:3px}
.stk{height:16px;border-radius:8px;overflow:hidden;display:flex;border:1px solid var(--line);margin:10px 0 4px}.stk div{height:100%}
.status{font-family:var(--fm);font-size:9px;padding:3px 8px;border-radius:999px;white-space:nowrap;text-decoration:none}
.st-built{background:#e7f7ef;color:#1f8a5a}.st-shown{background:#efe4f4;color:#43224d}.st-conf{background:#fdf6ea;color:#b0640c}.st-proposal{background:#eef2fb;color:#3a5bd0}

/* alerts settings */
.rulerow{display:flex;align-items:center;gap:12px;padding:12px 15px;border-bottom:1px solid var(--mist)}
.rulerow:last-child{border-bottom:0}
.tog{width:40px;height:22px;border-radius:999px;background:#d9cce0;position:relative;transition:.18s;flex:none}
.tog.on{background:#2f9b94}
.tog i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s}
.tog.on i{left:20px}

/* search results */
.sres{padding:9px 14px;border-bottom:1px solid var(--mist);cursor:pointer}
.sres:hover{background:#faf6fc}
.sk{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--magenta)}

/* toast */
.toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--purple);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 14px 30px -14px rgba(28,15,36,.6);display:flex;align-items:center;gap:9px;animation:rise .25s}
.toast .t{width:7px;height:7px;border-radius:50%;background:var(--magenta)}
@keyframes rise{from{transform:translateY(10px);opacity:0}}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--magenta);outline-offset:2px}
@media(max-width:1180px){.sectors,.cols3{grid-template-columns:1fr 1fr}.actors{grid-template-columns:1fr}.flow6{grid-template-columns:1fr 1fr 1fr}.auditsum{grid-template-columns:1fr 1fr}}
@media(max-width:1080px){.kpis{grid-template-columns:1fr 1fr}.grid2,.grid2.even,.rb,.cols2,.wkcol{grid-template-columns:1fr}}
@media(max-width:900px){.radarwrap{grid-template-columns:1fr;grid-template-rows:auto}.rcard{overflow:visible}.rcard .rlist{max-height:min(58vh,494px)}}
@media(max-width:720px){.app{grid-template-columns:1fr;grid-template-areas:"brand" "top" "main"}.side{display:none}.sectors,.flow6{grid-template-columns:1fr}.tier{grid-template-columns:1fr}}

/* ===== How-it-works animated overlay ===== */
.hw-overlay{position:fixed;inset:0;z-index:9998;background:rgba(28,15,36,.5);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s;padding:24px}
.hw-overlay.show{opacity:1;visibility:visible}
.hw-card{position:relative;width:min(1060px,96vw);max-height:92vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:18px;padding:34px 42px 26px;box-shadow:0 40px 90px -34px rgba(28,15,36,.45)}
.hw-close{position:absolute;top:16px;right:18px;background:var(--mist);border:none;color:var(--purple);width:34px;height:34px;border-radius:9px;font-size:15px;cursor:pointer}
.hw-close:hover{background:#ece0f2}
.hw-eyebrow{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.hw-head h2{margin:7px 0 12px;font-size:25px;color:var(--purple);letter-spacing:-.01em;font-weight:800}
.hw-rule{display:inline-block;font-size:12.5px;color:var(--purple);background:var(--mist);border:1px solid var(--line);padding:6px 14px;border-radius:999px;font-weight:600}
.hw-pipe{position:relative;margin:46px 0 22px;height:182px}
.hw-line{position:absolute;left:9%;right:9%;top:44px;height:2px;background:var(--line)}
.hw-flow{position:absolute;left:9%;right:9%;top:39px;height:12px;pointer-events:none}
.hw-dot{position:absolute;top:1px;width:9px;height:9px;border-radius:50%;background:#b893c9;animation:hwflow 7s linear infinite}
@keyframes hwflow{0%{left:-1%;opacity:0}7%{opacity:1}93%{opacity:1}100%{left:101%;opacity:0}}
.hw-stages{position:absolute;inset:0;display:flex;justify-content:space-between;gap:8px}
.hw-stage{flex:1;text-align:center;position:relative;z-index:2;padding:0 6px}
.hw-ico{width:58px;height:58px;border-radius:50%;margin:15px auto 13px;display:flex;align-items:center;justify-content:center;background:#f3eef8;border:1.5px solid #e4d7ee;animation:hwfill 7s infinite}
.hw-ico svg{width:24px;height:24px;fill:none;stroke:var(--purple);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.hw-stage:nth-child(1) .hw-ico{animation-delay:0s}
.hw-stage:nth-child(2) .hw-ico{animation-delay:1.4s}
.hw-stage:nth-child(3) .hw-ico{animation-delay:2.8s}
.hw-stage:nth-child(4) .hw-ico{animation-delay:4.2s}
.hw-stage:nth-child(5) .hw-ico{animation-delay:5.6s}
@keyframes hwfill{0%,13%{border-color:var(--magenta);box-shadow:0 0 0 5px rgba(224,4,78,.1);transform:translateY(-3px)}27%,100%{border-color:#e4d7ee;box-shadow:none;transform:none}}
.hw-stage.human .hw-ico{border-color:#e9b9cd}
.hw-label{font-size:15px;font-weight:700;color:var(--ink)}
.hw-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45;min-height:46px}
.hw-who{display:inline-block;margin-top:8px;font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;padding:3px 10px;border-radius:999px;font-weight:600}
.hw-who.ai{background:var(--mist);color:var(--muted)}
.hw-who.human{background:#fdeaf1;color:var(--magenta)}
.hw-who.out{background:#e8f5ee;color:#1f8a5a}
.hw-foot{text-align:center;font-size:13px;color:var(--muted);border-top:1px solid var(--line);padding-top:16px;margin-top:4px}
.hw-guide{margin-top:20px;border-top:1px solid var(--line);padding-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px 34px;text-align:left}
.hw-sec h4{margin:0 0 5px;font-size:13.5px;color:var(--purple);font-weight:600}
.hw-sec p{margin:0;font-size:12.5px;line-height:1.5;color:#3c2944}
.hw-screens{grid-column:1/-1}
.hw-row{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--mist);font-size:12.5px;line-height:1.45}
.hw-row b{min-width:138px;color:var(--purple);flex-shrink:0}
.hw-row span{color:#3c2944}
@media(max-width:760px){.hw-guide{grid-template-columns:1fr}.hw-row{flex-direction:column;gap:2px}.hw-row b{min-width:0}}
.hw-note{grid-column:1/-1;background:var(--mist);border-left:3px solid var(--magenta);border-radius:8px;padding:12px 16px;font-size:12.5px;line-height:1.5;color:#3c2944;margin:2px 0 4px}
.hw-note b{color:var(--purple)}
.hw-note2{font-size:12px;line-height:1.45;color:var(--muted);margin:0 0 8px}
.hw-screens h4{margin-top:2px}
.hw-foot b{color:var(--purple)}
@media(max-width:780px){.hw-pipe{height:auto}.hw-line,.hw-flow{display:none}.hw-stages{position:static;flex-direction:column;gap:14px}.hw-ico{animation:none;border-color:var(--magenta)}.hw-sub{min-height:0}}

/* ===== Animated operating loop (Agents & automation tab) ===== */
.oploop{position:relative;margin:14px 0 6px;padding:4px 0}
.opl-track{position:absolute;left:7.1%;right:7.1%;top:46px;height:2px;background:linear-gradient(90deg,#e4d7ee,#eac6d7);border-radius:2px;z-index:1}
.opl-token{position:absolute;top:41px;width:11px;height:11px;border-radius:50%;background:var(--magenta);box-shadow:0 0 0 4px rgba(224,4,78,.14);animation:opltoken 9.8s linear infinite;z-index:4}
@keyframes opltoken{0%{left:6%;opacity:0}4%{opacity:1}96%{opacity:1}100%{left:94%;opacity:0}}
.opl-stages{position:relative;display:flex;justify-content:space-between;gap:6px;z-index:2}
.opl-stage{flex:1;text-align:center;position:relative;min-width:0}
.opl-ico{width:52px;height:52px;margin:20px auto 10px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f6f1fa;border:1.5px solid #e4d7ee}
.opl-ico svg{width:22px;height:22px;fill:none;stroke:var(--purple);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.opl-stage.full .opl-ico{animation:oplpulseF 9.8s infinite}
.opl-stage.gated .opl-ico{border-color:#e9b9cd;background:#fdf3f7}
.opl-stage.gated .opl-ico svg{stroke:var(--magenta)}
.opl-stage.gated .opl-ico{animation:oplpulseG 9.8s infinite}
@keyframes oplpulseF{0%,8%{border-color:var(--purple);box-shadow:0 0 0 5px rgba(67,34,77,.10);transform:translateY(-3px)}22%,100%{border-color:#e4d7ee;box-shadow:none;transform:none}}
@keyframes oplpulseG{0%,8%{border-color:var(--magenta);box-shadow:0 0 0 5px rgba(224,4,78,.12);transform:translateY(-3px)}22%,100%{border-color:#e9b9cd;box-shadow:none;transform:none}}
.opl-stage:nth-child(1) .opl-ico{animation-delay:0s}
.opl-stage:nth-child(2) .opl-ico{animation-delay:1.4s}
.opl-stage:nth-child(3) .opl-ico{animation-delay:2.8s}
.opl-stage:nth-child(4) .opl-ico{animation-delay:4.2s}
.opl-stage:nth-child(5) .opl-ico{animation-delay:5.6s}
.opl-stage:nth-child(6) .opl-ico{animation-delay:7s}
.opl-stage:nth-child(7) .opl-ico{animation-delay:8.4s}
.opl-nm{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.2}
.opl-tier{display:inline-block;margin-top:6px;font-family:var(--fm);font-size:8.5px;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;font-weight:700}
.opl-tier.full{background:var(--mist);color:var(--purple)}
.opl-tier.gated{background:#fdeaf1;color:var(--magenta)}
.opl-tip{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% - 4px);width:158px;background:var(--purple);color:#fff;font-size:10.5px;line-height:1.4;padding:8px 11px;border-radius:9px;opacity:0;visibility:hidden;transition:opacity .15s;pointer-events:none;z-index:7;box-shadow:0 12px 26px -12px rgba(28,15,36,.6)}
.opl-tip b{color:#f4c9d9;display:block;font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;font-weight:700}
.opl-stage:hover .opl-tip{opacity:1;visibility:visible}
.opl-super{display:flex;align-items:center;gap:13px;margin:8px 7% 0;padding:12px 16px;background:linear-gradient(120deg,#f3eef8,#efe6f2);border:1px solid #e4d7ee;border-radius:12px}
.opl-super .s-ic{width:36px;height:36px;flex:none;border-radius:9px;background:var(--purple);display:flex;align-items:center;justify-content:center}
.opl-super .s-ic svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:1.7}
.opl-super .s-tx{font-size:12.4px;color:#3c2944;line-height:1.45}.opl-super .s-tx b{color:var(--purple)}
.opl-legend{display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:center;margin:16px 0 2px;font-size:11.3px;color:var(--muted)}
.opl-legend span{display:inline-flex;align-items:center;gap:6px}
.opl-legend i{width:11px;height:11px;border-radius:50%;display:inline-block;flex:none}
@media (prefers-reduced-motion:reduce){.opl-token{animation:none;left:50%}.opl-ico{animation:none!important}}
@media(max-width:820px){.opl-track,.opl-token{display:none}.opl-stages{flex-direction:column;gap:12px}.opl-stage{display:flex;align-items:center;gap:13px;text-align:left}.opl-ico{animation:none!important;margin:0;flex:none}.opl-tip{display:none}.opl-tier{margin-top:0;margin-left:auto}}
/* source-tier badges + lifecycle */
.srctier{font-family:var(--fm);font-size:9px;font-weight:700;width:16px;height:16px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;flex:none;margin-right:2px}
.srctier.st-A{background:#e7ddf0;color:var(--purple)}.srctier.st-B{background:#e4eef0;color:#2f7d76}.srctier.st-C{background:#f3e7ec;color:#9a6478}
.tierkey{font-family:var(--fm);font-size:10px;color:var(--muted)}
.tierkey b{color:var(--purple)}
/* coverage tags */
.covtag{display:inline-block;margin-top:7px;font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.03em;padding:2px 8px;border-radius:999px;font-weight:700}
.covtag.thin{background:var(--mist);color:var(--muted)}
.covtag.rich{background:#e7f3ec;color:#1f8a5a}
/* run economics */
.econ{display:flex;flex-direction:column;gap:0}
.econrow{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--mist)}
.econrow:last-child{border-bottom:0}
.econrow .en{font-family:var(--fm);font-size:10px;color:var(--magenta);font-weight:700;min-width:66px;padding-top:2px}
.econrow .eb{font-size:12.6px;color:#3c2944;line-height:1.5}.econrow .eb b{color:var(--purple)}
/* persistent prototype pill */
.protopill{display:inline-flex;align-items:center;gap:7px;background:var(--mist);border:1px solid var(--line);color:var(--muted);font-size:11px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
.protopill:hover{border-color:#d9c7e4;color:var(--purple)}
.protopill .pp-dot{width:7px;height:7px;border-radius:50%;background:var(--magenta);flex:none;animation:pulse 2.4s infinite}
@media(max-width:1080px){.protopill{display:none}}
/* inline document viewer */
.docov{position:fixed;inset:0;z-index:9999;background:rgba(28,15,36,.55);display:none;align-items:center;justify-content:center;padding:24px}
.docov.show{display:flex}
.docov-card{position:relative;width:min(900px,96vw);height:88vh;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 40px 90px -34px rgba(28,15,36,.5)}
.docov-close{position:absolute;top:12px;right:14px;z-index:2;background:var(--mist);border:1px solid var(--line);color:var(--purple);width:34px;height:34px;border-radius:9px;font-size:15px;cursor:pointer}
.docov-close:hover{background:#ece0f2}
.docov iframe{width:100%;height:100%;border:0;background:#fff}
/* foundations -> loop (zero to one) */
.fnd{margin:4px 0 2px}
.fnd-head{margin-bottom:12px}
.fnd-eyebrow{font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--magenta);font-weight:700}
.fnd-head .fnd-h{margin:4px 0 0;font-size:15.5px;color:var(--purple);font-weight:800;letter-spacing:-.01em}
.fnd-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:stretch}
.fnd-card{position:relative;border:1px solid var(--line);border-radius:12px;background:linear-gradient(160deg,#faf7fc,#f3edf8);overflow:hidden}
.fnd-sum{list-style:none;cursor:pointer;padding:14px;display:block;position:relative;transition:background .15s}
.fnd-sum::-webkit-details-marker{display:none}
.fnd-sum:hover{background:linear-gradient(160deg,#f6f0fa,#eee4f4)}
details.fnd-card[open]{border-color:var(--magenta);box-shadow:0 14px 32px -18px rgba(67,34,77,.5)}
.fnd-chev{position:absolute;bottom:12px;right:12px;color:#b89bc8;transition:transform .2s}
.fnd-chev svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
details[open] .fnd-chev{transform:rotate(180deg);color:var(--magenta)}
.fnd-exp{padding:0 14px 14px;border-top:1px solid var(--line)}
.fnd-lead{font-size:11.6px;color:#4a3753;line-height:1.45;margin:11px 0 8px}
.fnd-lines{list-style:none;margin:0 0 10px;padding:0}
.fnd-lines li{font-size:11.6px;color:#3c2944;padding:3px 0 3px 14px;position:relative;line-height:1.4}
.fnd-lines li:before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--magenta)}
.fnd-open{font-family:var(--fm);font-size:10.5px;font-weight:700;color:var(--magenta);cursor:pointer;text-decoration:none}
.fnd-open:hover{text-decoration:underline}
.fnd-hint{font-size:11px;color:var(--muted);margin-top:3px}
.fnd-cont{border-color:#e9b9cd}
.fnd-cont .fnd-ic{background:var(--magenta)}
.fnd-cont .fnd-n{color:var(--magenta)}
.creg-row{display:flex;align-items:baseline;gap:12px;padding:7px 0;border-bottom:1px solid var(--mist)}
.creg-row:last-child{border-bottom:0}
.creg-code{font-family:var(--fm);font-size:11.5px;font-weight:700;color:var(--purple);min-width:96px;flex:none}
.creg-scope{font-size:12.6px;color:#3c2944;flex:1;line-height:1.4}
.creg-n{font-family:var(--fm);font-size:9.5px;color:var(--muted);white-space:nowrap}
.msr{padding:12px 0;border-bottom:1px solid var(--mist)}
.msr:last-child{border-bottom:0}
.msr-h{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;margin-bottom:4px}
.msr-n{font-size:13px;font-weight:800;color:var(--purple)}
.msr-q{font-family:var(--fm);font-size:10.5px;color:var(--muted)}
.msr-tag{margin-left:auto;font-family:var(--fm);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 9px;border-radius:999px}
.msr-tag.computed{background:#e7f3ec;color:#1f8a5a}
.msr-tag.estimate{background:#fdeaf1;color:var(--magenta)}
.msr-d{font-size:12.2px;color:#3c2944;line-height:1.5}
.msr-src{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}
.fctlist{margin-top:7px}
.fctd{font-size:11.6px;color:#4a3753;line-height:1.4;padding:2px 0 2px 12px;border-left:2px solid var(--mist)}
.fctd b{color:var(--purple);font-weight:700;margin-right:5px}
.fnd-n{position:absolute;top:12px;right:13px;font-family:var(--fm);font-size:10px;font-weight:700;color:#c9b3d6}
.fnd-ic{width:34px;height:34px;border-radius:9px;background:var(--purple);display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.fnd-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.fnd-t{font-size:14px;font-weight:800;color:var(--purple)}
.fnd-d{font-size:11.6px;color:#4a3753;line-height:1.42;margin:3px 0 8px}
.fnd-meta{font-family:var(--fm);font-size:9.5px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase}
.fnd-arrow{display:flex;align-items:center;gap:12px;margin:14px 2px 4px;color:var(--muted);font-size:12px}
.fnd-arrow .ln{height:1px;background:var(--line);flex:1}
.fnd-arrow b{color:var(--purple);font-weight:600;white-space:nowrap}
.fnd-arrow svg{width:15px;height:15px;stroke:var(--magenta);fill:none;stroke-width:2;flex:none}
.run-eyebrow{font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--magenta);font-weight:700;display:block;margin:2px 0 10px}
.fnd-mini{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:var(--mist);border:1px solid var(--line);border-radius:11px;padding:9px 14px;margin:0 0 14px;font-size:12px}
.fnd-mini .fm-lbl{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--magenta);font-weight:700}
.fnd-mini .fm-chip{color:var(--purple);font-weight:600;text-decoration:none;cursor:pointer;border-bottom:1px dotted #c9b3d6}
.fnd-mini .fm-chip:hover{color:var(--magenta);border-color:var(--magenta)}
.fnd-mini svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;flex:none}
.fnd-mini .fm-run{color:var(--muted)}
@media(max-width:1000px){.fnd-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.fnd-grid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.fnd-grid{grid-template-columns:1fr}}
</style>

<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>Operating Loop Architecture</h1><p class="sub">How a signal moves from first sighting to a Board-ready brief, and exactly where a human decides.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">Operating loop</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / Operating loop</p>

<p class="lead">This document describes how a signal moves through Foresight from first sighting to a Board-ready brief, and exactly where a human decides. It is the architecture behind the <em>Operating loop</em> tab.</p>
<div class="rule"><b>The one rule:</b> AI proposes, humans dispose. Software scans, sorts and drafts. A named person decides what is true enough to publish. Every automated action is logged and reversible.</div>

<h2>The four actors</h2>
<table>
<tr><th>Actor</th><th>Does</th><th>Never</th></tr>
<tr><td><b>Agentic AI</b><br><span style="color:var(--muted)">the do-er</span></td><td>Monitors sources, fetches and cross-checks, tags by lens and facet, clusters duplicates, routes to people.</td><td>Decides what is true, publishes, or sets Board priorities.</td></tr>
<tr><td><b>Generative AI</b><br><span style="color:var(--muted)">the drafter</span></td><td>Summarises, extracts facts, drafts briefs, all grounded in fetched sources.</td><td>Invents facts or uses anything outside the fetched evidence.</td></tr>
<tr><td><b>Analysts</b><br><span style="color:var(--muted)">the validators</span></td><td>Check evidence, confirm or correct the label and the TRL band, approve or reject drafts.</td><td>Wave items through unread. Every validation is attributable.</td></tr>
<tr><td><b>Market Strategy Board</b><br><span style="color:var(--muted)">the deciders</span></td><td>Reviews validated signals, sets priorities and actions.</td><td>Acts on unvalidated material.</td></tr>
</table>

<h2>The six-stage loop</h2>
<div class="steps">
<div class="step"><h4>Scan</h4><p>Agents continuously watch the source universe (standards bodies, regulators, patents, scholarly and reputable press) for new or changed material.</p><div class="gate">Gate: none · read-only collection within the allowed source list.</div><div class="who">Owner: Agentic AI</div></div>
<div class="step"><h4>Structure</h4><p>Items are sorted into IEC categories; facts are extracted, linked to the committee that owns them, deduplicated and tagged by lens and facet.</p><div class="gate">Gate: none · but every extracted fact keeps a link back to its source (provenance).</div><div class="who">Owner: Agentic AI + Generative AI</div></div>
<div class="step"><h4>Validate</h4><p>An analyst checks the evidence, confirms or corrects the classification label and the TRL band, and resolves anything sitting on a boundary.</p><div class="gate">Gate: <b>human</b> · a signal is not "validated" until a named analyst says so.</div><div class="who">Owner: Analyst</div></div>
<div class="step"><h4>Decide</h4><p>The Board reviews validated signals, weighs impact and horizon, and sets actions and priorities.</p><div class="gate">Gate: <b>human</b> · Board judgement, supported by the evidence trail.</div><div class="who">Owner: Market Strategy Board</div></div>
<div class="step"><h4>Publish</h4><p>Approved briefs are assembled and released, each carrying its sources and a named sign-off.</p><div class="gate">Gate: <b>human</b> · nothing leaves the platform without a named approver.</div><div class="who">Owner: Analyst / Editor</div></div>
<div class="step"><h4>Monitor</h4><p>Published signals stay watched; momentum, maturity and corroboration are tracked, and material change re-opens the loop.</p><div class="gate">Gate: none to re-watch; any label change re-enters Validate.</div><div class="who">Owner: Agentic AI, with analyst review</div></div>
</div>

<h2>Data flow and handoffs</h2>
<p>The loop is a pipeline, not a single model call. Each stage produces a defined artefact the next stage consumes:</p>
<ul>
<li><b>Scan → Structure:</b> raw items with source URLs become structured records (lens, facet, committee link, extracted facts).</li>
<li><b>Structure → Validate:</b> structured records carry a <em>proposed</em> classification and TRL band for a human to confirm.</li>
<li><b>Validate → Decide:</b> only confirmed records, with the analyst's name and any override note attached.</li>
<li><b>Decide → Publish:</b> Board-prioritised signals flow into briefs; the drafter writes, a human signs off.</li>
<li><b>Monitor → Scan:</b> watched signals feed change detection back to the top of the loop.</li>
</ul>

<h2>Why the gates are not optional</h2>
<p>Automation removes the slow manual glue between steps. That is the benefit · and the concentration of risk. One bad rule can act quickly and repeatedly before anyone notices. The architecture answers this with three things that always hold:</p>
<ul>
<li><b>Logging</b> · every automated action is recorded and reversible.</li>
<li><b>Limits</b> · agents act only within set guardrails and rate limits.</li>
<li><b>Human gates</b> · validate, decide and publish each require a named person.</li>
</ul>

<h2>Throughput, latency and resilience <span class="tc">to confirm</span></h2>
<p>Target detection-to-validated-signal time, scan frequency per source class, and concurrency limits are operational parameters to be set with IEC during the funded build. The platform is designed so that if an agent or model is unavailable, collection degrades gracefully (queued, not lost) and no automated step can publish on its own.</p>

<h2>Failure modes and fallbacks</h2>
<table>
<tr><th>If this fails</th><th>What happens</th><th>Fallback</th></tr>
<tr><td>A source feed goes dark</td><td>Coverage gap for that source</td><td>Flagged in freshness monitoring; analyst notified; alternate sources in the tier still run.</td></tr>
<tr><td>The drafter produces an unsupported claim</td><td>Claim without provenance</td><td>Grounding rule blocks it; ungrounded claims are not publishable.</td></tr>
<tr><td>An agent loops or over-acts</td><td>Excess actions</td><td>Rate limits and the kill-switch stop it; actions are reversible from the log.</td></tr>
</table>


<div class="foot">Prepared by Evalueserve (Insightsfirst) as part of the IEC RFI response. This is a working draft for the IEC Market Strategy Board to review and redline. Figures and operational parameters marked <span class="tc">to confirm</span> are placeholders pending IEC input or the funded build. Nothing in this platform is scored or forecast; signals are classified weak, building or established by a named analyst. AI proposes, humans dispose.</div>
</div></body></html>`,

<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>Agents &amp; Automation Specification</h1><p class="sub">Every agent, its limits, the grounding rule, and the source universe it is allowed to read.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">Agents & automation</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / Agents & automation</p>

<p class="lead">This document specifies the automation: what each agent does, the limits it works inside, and the rule that keeps the language model tied to its sources. It sits behind the <em>Agents &amp; automation</em> tab.</p>
<div class="rule"><b>What "agentic" means here:</b> programs that take actions with tools, in steps, on their own · but only within set limits, and always logged. They remove manual glue; they do not exercise judgement.</div>

<h2>Agent roster</h2>
<table>
<tr><th>Agent</th><th>Job</th><th>Autonomy</th><th>Escalates when</th></tr>
<tr><td><b>Monitoring</b></td><td>Watch source feeds, pull new items, remove duplicates.</td><td>Full</td><td>A source breaks or coverage drops.</td></tr>
<tr><td><b>Extraction &amp; tagging</b></td><td>Use Gen AI to classify, extract facts, link to committees.</td><td>Full</td><td>An item can't be classified with confidence.</td></tr>
<tr><td><b>Triage</b></td><td>Cluster duplicates, tag by lens and facet, attach sources, flag novelty and momentum.</td><td>Full</td><td>A signal sits on a label boundary.</td></tr>
<tr><td><b>Cross-check</b></td><td>Triangulate across sources; flag single-source or contradictory claims.</td><td>Full</td><td>A high-impact claim has thin support.</td></tr>
<tr><td><b>Routing</b></td><td>Send each signal to the right analyst or committee queue.</td><td>Full</td><td>Ownership is unclear.</td></tr>
<tr><td><b>Drafting</b></td><td>Assemble briefings and white-paper drafts with citations.</td><td>Gated</td><td>Always · a person reviews before publishing.</td></tr>
<tr><td><b>Alerting</b></td><td>Generate alerts and the weekly digest; notify committees.</td><td>Gated</td><td>A high-impact alert needs sign-off.</td></tr>
<tr><td><b>Orchestrator</b></td><td>Sequence the agents, retry failures, enforce rules, log every step.</td><td>Supervisor</td><td>A rule is breached or an action can't complete safely.</td></tr>
</table>
<p class="note">Roster shown at specification level. Exact tool bindings, model versions and concurrency are set during the funded build. <span class="tc">to confirm</span></p>

<h2>Guardrails</h2>
<ul>
<li><b>Allowed-source list</b> · agents read only from the defined source universe (see the Source Universe document). Nothing is fetched from outside it.</li>
<li><b>Read-only collection</b> · scanning never changes a source; it only records what is found.</li>
<li><b>Rate limits</b> · each agent has a ceiling on actions per unit time, so a fault cannot cascade.</li>
<li><b>Full logging</b> · every action, with its inputs and outputs, is recorded and reversible.</li>
<li><b>Kill-switch</b> · any agent can be paused without taking down the platform.</li>
</ul>

<h2>Grounding (RAG)</h2>
<p>The drafting agent uses <b>retrieval-augmented generation</b>: the model may only use facts fetched from real documents, not its own memory, and every claim must point to a source. An ungrounded claim is not publishable. Grounding adds a small processing step and keeps every statement traceable to a source.</p>
<div class="note"><b>Why this matters:</b> it is the main defence against a confident-sounding but invented statement. If a sentence in a brief has no source behind it, the platform treats it as not yet true.</div>

<h2>The source universe in brief</h2>
<p>Agents read a curated, tiered set of sources rather than the open web. In short: authoritative primary sources (standards bodies, regulators, patent and scholarly records) are Tier A; reputable corroborating sources are Tier B; leading-but-unconfirmed sources (trade press, vendor announcements) are Tier C and never stand alone. The full definition, languages and licensed-feed scope are set out in the <b>Source Universe &amp; Credibility Tiers</b> document, which the Board is asked to validate.</p>

<h2>Autonomy and escalation</h2>
<p>Autonomy is deliberately uneven. Collection and tagging run at full autonomy because they are reversible and low-stakes. Anything that asserts a fact to a reader (a draft, a label on a boundary, a figure without a primary source) escalates to a person. The principle: the closer an action gets to publication or judgement, the less autonomy it has.</p>


<div class="foot">Prepared by Evalueserve (Insightsfirst) as part of the IEC RFI response. This is a working draft for the IEC Market Strategy Board to review and redline. Figures and operational parameters marked <span class="tc">to confirm</span> are placeholders pending IEC input or the funded build. Nothing in this platform is scored or forecast; signals are classified weak, building or established by a named analyst. AI proposes, humans dispose.</div>
</div></body></html>`,

<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>Signal Classification Method</h1><p class="sub">How a signal is classified weak, building or established · the questions, the labels, and why there is no score.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">Classification method</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / Classification method</p>

<p class="lead">This document sets out how a signal is classified weak, building or established. It is the method behind the <em>Classification method</em> tab. It deliberately uses plain questions and labels, not a score.</p>
<div class="rule"><b>Classification, not scoring.</b> A single number would imply a precision the evidence does not support. Foresight asks a small set of plain questions and assigns one of three clear labels. The pattern is judged by a named analyst, not computed.</div>

<h2>The questions we ask</h2>
<table>
<tr><th>Question</th><th>What it asks</th><th>Which way it leans</th></tr>
<tr><td><b>Is it new?</b></td><td>Whether the development is new relative to what the watch list already tracks.</td><td>Newness leans weak / early</td></tr>
<tr><td><b>Is it moving?</b></td><td>Whether evidence is building across sources · the momentum read.</td><td>Fast movement leans weak / early</td></tr>
<tr><td><b>Who else says so?</b></td><td>How many independent, varied sources report it, and whether they agree.</td><td>More agreeing sources lean established</td></tr>
<tr><td><b>How proven is it?</b></td><td>Maturity expressed as a TRL band, 1 (idea) to 9 (in everyday use).</td><td>Higher TRL leans established</td></tr>
<tr><td><b>How far does it reach?</b></td><td>Breadth of IEC committees and sectors it would touch.</td><td>Used to rank priority, not to classify</td></tr>
</table>
<p class="note">Note the questions pull in <b>opposite</b> directions on purpose. Newness and fast movement mark something <em>early</em>; corroboration and maturity mark something <em>established</em>. A weak signal is the interesting case where both are true at once: new and moving, but not yet well-evidenced.</p>

<h2>The three labels</h2>
<div class="cardgrid">
<div class="kard"><h4>Weak signal</h4><p>New and moving, but still thin on independent corroboration and low on maturity. Faint but accelerating. <b>Action:</b> watch; do not yet brief.</p></div>
<div class="kard"><h4>Building</h4><p>Gathering corroboration and maturity, not yet settled. <b>Action:</b> track and prepare.</p></div>
<div class="kard"><h4>Established</h4><p>Well corroborated, mature, and sources agree. <b>Action:</b> ready to inform standards decisions.</p></div>
</div>
<p>A named analyst sets the label by weighing the questions and recording the judgement; no score is shown. In this prototype the label is derived from those analyst-set measures by a transparent rule, so the example signals behave consistently, and the live build puts the analyst in that seat. Any later change to a label is logged with who changed it and why (the override log).</p>

<h2>Maturity is the TRL band</h2>
<p>The "how proven is it?" question uses the Technology Readiness Level scale, the one part of the method that maps to a recognised standard. The band is read from the evidence · papers and patents sit low, pilots and demonstrators in the middle, deployments and standards activity high · and then confirmed by an analyst.</p>
<div class="kv">
<dt>TRL 1–3</dt><dd>Idea to proof of concept · literature, early lab work.</dd>
<dt>TRL 4–6</dt><dd>Validated in lab to prototype demonstrated in a relevant setting.</dd>
<dt>TRL 7–9</dt><dd>Pilot in operation to proven in everyday use.</dd>
</div>
<p>TRL is about how proven a thing is, not how important. A high-impact signal can still sit at TRL 3. The full 1-to-9 ladder is in the dashboard's Maturity / TRL view.</p>

<h2>Worked examples</h2>
<div class="cardgrid">
<div class="kard"><h4>Weak · AI for grid operations</h4><p>Newly surfaced, accelerating, but few independent sources and low TRL. Flagged <b>weak</b>: routed to a human to watch, not yet to a brief.</p></div>
<div class="kard"><h4>Established · wide-bandgap (GaN/SiC) power devices</h4><p>Tracked already, many agreeing sources, high TRL, broad reach. Flagged <b>established</b>: ready to inform standards decisions.</p></div>
</div>

<h2>Horizon bands</h2>
<p>Separate from the label, each signal carries a time-to-mainstream read · now, 2–4 years, or 5+ years · derived from maturity plus momentum. It answers "when might this matter?" rather than "how solid is it?". Like the label, it is a proposed read an analyst confirms.</p>

<h2>Why expose the method</h2>
<p>Showing the questions, the labels and the override log lets a committee review and challenge any classification. A single score would not make that review as straightforward.</p>


<div class="foot">Prepared by Evalueserve (Insightsfirst) as part of the IEC RFI response. This is a working draft for the IEC Market Strategy Board to review and redline. Figures and operational parameters marked <span class="tc">to confirm</span> are placeholders pending IEC input or the funded build. Nothing in this platform is scored or forecast; signals are classified weak, building or established by a named analyst. AI proposes, humans dispose.</div>
</div></body></html>`,

<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>Human Supervision &amp; Accountability</h1><p class="sub">The supervision tiers, the RACI map, override monitoring, and what must always pass a named person.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">Human supervision</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / Human supervision</p>

<p class="lead">This document describes who supervises the automation and who is accountable for what. It sits behind the <em>Human supervision</em> tab.</p>
<div class="rule"><b>Principle:</b> automation is supervised, not hidden. Three tiers of oversight sit over the loop, and every published item traces to a named person.</div>

<h2>The three tiers</h2>
<table>
<tr><th>Tier</th><th>Who</th><th>Watches</th><th>Authority</th></tr>
<tr><td><b>Tier 0</b><br>Automated</td><td>Agents + Generative AI</td><td>Scanning, tagging, clustering, draft assembly.</td><td>Acts within guardrails; everything logged and reversible.</td></tr>
<tr><td><b>Tier 1</b><br>Analyst</td><td>Named analysts</td><td>Evidence, classification labels, TRL bands, drafts.</td><td>Confirms, corrects or overrides any label; approves or rejects drafts.</td></tr>
<tr><td><b>Tier 2</b><br>Board</td><td>Market Strategy Board</td><td>Validated signals, priorities, actions.</td><td>Decides what the organisation does about a signal.</td></tr>
</table>

<h2>Accountability map (RACI)</h2>
<p>R = responsible (does the work), A = accountable (owns the outcome), C = consulted, I = informed.</p>
<table>
<tr><th>Step</th><th>Agents</th><th>Analyst</th><th>Lead analyst</th><th>Board</th></tr>
<tr><td>Scan &amp; structure</td><td>R</td><td>I</td><td>A</td><td>I</td></tr>
<tr><td>Classify &amp; set TRL</td><td>C (proposes)</td><td>R</td><td>A</td><td>I</td></tr>
<tr><td>Validate signal</td><td>-</td><td>R</td><td>A</td><td>I</td></tr>
<tr><td>Draft brief</td><td>R (drafts)</td><td>C</td><td>A</td><td>I</td></tr>
<tr><td>Publish / sign-off</td><td>-</td><td>R</td><td>A</td><td>C</td></tr>
<tr><td>Decide &amp; prioritise</td><td>-</td><td>C</td><td>C</td><td>R / A</td></tr>
</table>

<h2>The sign-off gate</h2>
<p>Nothing leaves the platform without a named approver. A brief is not "published" because the drafter finished it; it is published because a person put their name to it. The approver's name travels with the brief.</p>

<h2>Watching the override rate · both ways</h2>
<p>How often analysts override the proposed label is itself monitored, because it can fail in two directions:</p>
<ul>
<li><b>Too high</b> · the automated proposals are weak and need rework.</li>
<li><b>Too low</b> · a warning sign of <em>automation bias</em>: people rubber-stamping the machine without really checking.</li>
</ul>
<p>A healthy middle is the goal. The metric is reviewed regularly rather than set once.</p>

<h2>Open items <span class="tc">to confirm</span></h2>
<ul>
<li>Named roles and cover arrangements for Tier 1 and Tier 2.</li>
<li>Certifications and data-residency requirements for the hosting environment.</li>
<li>Service levels for time-to-validate and review cadence.</li>
</ul>

<header class="m"><div class="wrap">
<div class="brandline"><b>Insightsfirst</b> <span>Foresight</span> <span class="ed">IEC EDITION</span></div>
<h1>Controls &amp; Risk Register</h1><p class="sub">The controls that keep the platform trustworthy and the risks it is built to withstand.</p>
<div class="tags"><span class="tag draft">Draft v1 · for review</span><span class="tag">IEC Market Strategy Board</span><span class="tag">Controls & risk</span></div>
</div></header>
<div class="wrap">
<p class="crumb" style="font-family:var(--fm);font-size:11px;color:var(--muted)">How it works / Controls & risk</p>

<p class="lead">This document lists the controls that keep the platform trustworthy and the risks it is built to withstand. It sits behind the <em>Controls &amp; risk</em> tab.</p>

<h2>Controls</h2>
<table>
<tr><th>Control</th><th>What it does</th></tr>
<tr><td><b>Provenance on every fact</b></td><td>Each extracted fact keeps a link back to its source, so any claim can be traced and checked.</td></tr>
<tr><td><b>Grounding (RAG)</b></td><td>The drafter may only use fetched evidence; ungrounded claims are blocked from publication.</td></tr>
<tr><td><b>Allowed-source list</b></td><td>Agents read only from the defined, tiered source universe · not the open web.</td></tr>
<tr><td><b>Full action log</b></td><td>Every automated action is recorded and reversible.</td></tr>
<tr><td><b>Rate limits &amp; kill-switch</b></td><td>Caps on agent activity and the ability to pause any agent without downing the platform.</td></tr>
<tr><td><b>Human gates</b></td><td>Validate, decide and publish each require a named person.</td></tr>
<tr><td><b>Override log</b></td><td>Every label change records who, when and why.</td></tr>
</table>

<h2>Risk register</h2>
<table>
<tr><th>Risk</th><th>What could happen</th><th>Mitigation</th></tr>
<tr><td><b>Speed concentration</b></td><td>One bad rule acts fast and often before anyone notices.</td><td>Rate limits, logging, reversibility, human gates before anything publishes.</td></tr>
<tr><td><b>Hallucination</b></td><td>The model states something plausible but untrue.</td><td>Grounding rule; ungrounded claims are not publishable; analyst validation.</td></tr>
<tr><td><b>Source poisoning</b></td><td>A low-quality or planted source inflates a signal.</td><td>Tiered sources; Tier C never stands alone; corroboration across independent sources required.</td></tr>
<tr><td><b>Automation bias</b></td><td>People rubber-stamp the machine.</td><td>Override-rate monitoring; named sign-off; periodic review.</td></tr>
<tr><td><b>Coverage gaps</b></td><td>A live area is missed because no source covers it.</td><td>Freshness monitoring; empty facets shown rather than hidden; analyst review of gaps.</td></tr>
<tr><td><b>Language gaps</b></td><td>A non-English filing is missed or mistranslated.</td><td>Signals carry source language; multi-language coverage <span class="tc">to confirm</span>.</td></tr>
<tr><td><b>Over-claiming maturity</b></td><td>A signal looks more proven than it is.</td><td>TRL band read from evidence then analyst-confirmed; TRL kept separate from impact.</td></tr>
</table>

<h2>Residual risk and open items <span class="tc">to confirm</span></h2>
<p>No system removes risk entirely. The residual exposure the Board should weigh: the breadth and quality of the licensed source feeds purchased, the language coverage funded, and the analyst capacity available to validate at the cadence the Board needs. These are scope and funding decisions rather than design gaps, and are flagged for the procurement conversation.</p>


<div class="foot">Prepared by Evalueserve (Insightsfirst) as part of the IEC RFI response. This is a working draft for the IEC Market Strategy Board to review and redline. Figures and operational parameters marked <span class="tc">to confirm</span> are placeholders pending IEC input or the funded build. Nothing in this platform is scored or forecast; signals are classified weak, building or established by a named analyst. AI proposes, humans dispose.</div>
</div></body></html>`,
